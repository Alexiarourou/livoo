<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community — Livvo</title>
<meta name="description" content="Join your Livvo city community: Erasmus, interns and nomads.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23059669'/><path d='M8 12l8 12 8-12-4-6H12z' stroke='white' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #059669; --green-light: #10b981; --green-dark: #047857;
  --bg-dark: #f0f7f2; --surface-dark: #ffffff; --border-dark: #d4e5dc;
  --text-dark: #1a2e24; --muted-dark: #4a7c5e;
}
html { scroll-behavior: smooth; }
body { background: var(--bg-dark); color: var(--text-dark); font-family: "DM Sans", sans-serif; overflow-x: hidden; }

nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; height: 64px; padding: 0 48px; display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.95); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border-dark); }
.logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
.logo-icon { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, var(--green), var(--green-light)); display: flex; align-items: center; justify-content: center; }
.logo-word { font-family: "Outfit", sans-serif; font-weight: 800; font-size: 1.2rem; letter-spacing: -0.04em; color: var(--text-dark); }
.logo-word span { color: var(--green); }
.nav-links { display: flex; align-items: center; gap: 24px; }
.nav-links a { font-size: 0.85rem; color: var(--muted-dark); text-decoration: none; }
.nav-links a:hover, .nav-links a.active { color: var(--text-dark); }
.btn-nav { background: var(--green); color: white; padding: 8px 20px; border-radius: 8px; font-size: 0.83rem; font-weight: 600; text-decoration: none; }
.nav-links a.btn-nav { color: white; }
.nav-links a.btn-nav:hover { color: white; background: var(--green-dark); }
.nav-cta-secondary { font-size: 0.83rem; font-weight: 600; color: var(--muted-dark); text-decoration: none; }
.nav-cta-secondary:hover { color: var(--green); }

.city-page-top { padding: 88px 48px 0; max-width: 1200px; margin: 0 auto; }
.city-back { font-size: 0.88rem; font-weight: 600; color: var(--muted-dark); text-decoration: none; display: inline-block; margin-bottom: 20px; }
.city-back:hover { color: var(--green); }

.city-hero-wrap { max-width: 1200px; margin: 0 auto; padding: 0 48px 40px; }
#cityHero.city-cover {
  height: auto;
  min-height: 280px;
  border-radius: 20px;
  background-size: cover;
  background-position: center;
}
.city-icon { position: absolute; top: 20px; right: 20px; width: 48px; height: 48px; border-radius: 12px; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; }
.city-icon svg { width: 24px; height: 24px; }
.city-icon svg path { stroke: white; }
.city-name-big { font-family: "Outfit", sans-serif; font-weight: 900; font-size: 2rem; letter-spacing: -0.04em; color: white; text-shadow: 0 1px 3px rgba(0,0,0,0.4); }
.city-cover { height: 200px; position: relative; overflow: hidden; display: flex; align-items: flex-end; padding: 20px; background-size: cover; background-position: center; }

.section { padding: 0 48px 80px; max-width: 1200px; margin: 0 auto; }
.city-body { padding: 24px; flex: 1; display: flex; flex-direction: column; min-height: 0; }
.city-landing-panel {
  max-width: 560px;
  margin: 0 auto;
  background: var(--surface-dark);
  border: 1px solid var(--border-dark);
  border-radius: 20px;
  overflow: hidden;
}
.city-meta { display: flex; align-items: center; justify-content: flex-start; margin-bottom: 16px; min-height: 1.25rem; }
.city-status { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; font-weight: 600; color: var(--muted-dark); }
.dot-active { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.city-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
.city-tag { background: rgba(5,150,105,0.08); border: 1px solid var(--border-dark); padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; color: var(--muted-dark); }
.city-groups { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; flex: 1; }
.group-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  height: 48px;
  min-height: 48px;
  max-height: 48px;
  padding: 0 14px;
  background: var(--bg-dark);
  border: 1px solid var(--border-dark);
  border-radius: 10px;
  transition: all 0.2s;
  box-sizing: border-box;
}
.group-row:hover { background: rgba(5,150,105,0.06); border-color: rgba(5,150,105,0.2); }
.group-name {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text-dark);
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.group-name svg { width: 16px; height: 16px; flex-shrink: 0; }
.group-name svg path { stroke: var(--muted-dark); }
.group-join { font-size: 0.72rem; font-weight: 700; color: var(--green); flex-shrink: 0; white-space: nowrap; }
a.group-row { text-decoration: none; color: inherit; cursor: pointer; }
.btn-city { width: 100%; padding: 12px; background: transparent; border: 1px solid rgba(5,150,105,0.3); border-radius: 10px; color: var(--green); font-family: "DM Sans", sans-serif; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: center; text-decoration: none; display: block; margin-top: auto; flex-shrink: 0; }
.btn-city:hover { background: rgba(5,150,105,0.08); border-color: var(--green); }
.btn-city-active { background: var(--green); border-color: var(--green); color: white; }
.btn-city-active:hover { background: var(--green-dark); }

@media (max-width: 900px) {
  nav { padding: 0 20px; }
  .city-page-top { padding: 88px 24px 0; }
  .city-hero-wrap { padding: 0 24px 32px; }
  .section { padding: 0 24px 60px; }
  .nav-links { display: none; }
}
</style>
</head>
<body>

<nav>
  <a class="logo" href="index.html" aria-label="Livvo home">
    <div class="logo-icon"><svg viewBox="0 0 18 18" fill="none" width="16" height="16"><path d="M2 3L9 15L16 3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <span class="logo-word">li<span>vv</span>o</span>
  </a>
  <div class="nav-links">
    <a href="search-athens.html" class="btn-nav">Browse rentals</a>
    <a href="community.html" class="active">Community</a>
    <a href="flatmate-signup.html">Find a Flatmate</a>
    <a href="landlord-dashboard.html">For Landlords</a>
    <a href="index.html#waitlist" class="nav-cta-secondary">Get early access</a>
  </div>
</nav>

<div class="city-page-top">
  <a class="city-back" href="community.html">← Back to all cities</a>
</div>

<div class="city-hero-wrap">
  <div id="cityHero" class="city-cover" role="img" aria-label="">
    <div class="city-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
    <div id="cityNameOverlay" class="city-name-big"></div>
  </div>
</div>

<div class="section">
  <div class="city-landing-panel">
    <div class="city-body">
      <div class="city-meta"><div class="city-status"><span class="dot-active"></span> Now open • Active</div></div>
      <div class="city-tags"><span class="city-tag">Erasmus</span><span class="city-tag">Interns</span><span class="city-tag">Professionals</span><span class="city-tag">Nomads</span></div>
      <div class="city-groups">
        <a id="joinRowErasmus" href="#" class="group-row"><span class="group-name"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c0 1 2 2 6 2s6-1 6-2v-5"/></svg><span id="labelErasmus">Erasmus</span></span><span class="group-join">Join</span></a>
        <a id="joinRowInterns" href="#" class="group-row"><span class="group-name"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>Interns &amp; Professionals</span><span class="group-join">Join</span></a>
        <a id="joinRowNomads" href="#" class="group-row"><span class="group-name"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg><span id="labelNomads">Nomads</span></span><span class="group-join">Join</span></a>
      </div>
      <a id="joinCityMain" href="#" class="btn-city btn-city-active"></a>
    </div>
  </div>
</div>

<script>
(function () {
  const CITY_DATA = {
    paris: { name: 'Paris', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/La_Tour_Eiffel_vue_de_la_Tour_Saint-Jacques%2C_Paris_ao%C3%BBt_2014_%282%29.jpg/1280px-La_Tour_Eiffel_vue_de_la_Tour_Saint-Jacques%2C_Paris_ao%C3%BBt_2014_%282%29.jpg' },
    athens: { name: 'Athens', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/d/da/The_Parthenon_in_Athens.jpg/1280px-The_Parthenon_in_Athens.jpg' },
    london: { name: 'London', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/67/London_Skyline_%28125508655%29.jpeg/1280px-London_Skyline_%28125508655%29.jpeg' },
    madrid: { name: 'Madrid', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Gran_Via_de_Madrid.jpg/1280px-Gran_Via_de_Madrid.jpg' },
    barcelona: { name: 'Barcelona', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/1f/Sagrada_Familia_01.jpg/1280px-Sagrada_Familia_01.jpg' },
    berlin: { name: 'Berlin', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Berliner_Fernsehturm_und_Marienkirche.jpg/1280px-Berliner_Fernsehturm_und_Marienkirche.jpg' },
    amsterdam: { name: 'Amsterdam', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/81/Amsterdam_-_Herengracht_cropped.jpg/1280px-Amsterdam_-_Herengracht_cropped.jpg' },
    lisbon: { name: 'Lisbon', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/73/Tejo_e_ponte25abril.jpg/1280px-Tejo_e_ponte25abril.jpg' },
    prague: { name: 'Prague', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Prague_%2833%29.jpg/1280px-Prague_%2833%29.jpg' },
    budapest: { name: 'Budapest', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/75/Budapest_Parliament_Building.jpg/1280px-Budapest_Parliament_Building.jpg' },
    vienna: { name: 'Vienna', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/41/Wiener_Staatsoper_-_total.jpg/1280px-Wiener_Staatsoper_-_total.jpg' },
    copenhagen: { name: 'Copenhagen', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Copenhagen_-_Nyhavn_%28crop%29.jpg/1280px-Copenhagen_-_Nyhavn_%28crop%29.jpg' },
    stockholm: { name: 'Stockholm', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/60/Stockholm_-_Gamla_Stan.jpg/1280px-Stockholm_-_Gamla_Stan.jpg' },
    dublin: { name: 'Dublin', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Dublin_-_Ha%27penny_Bridge_-_20100613-0033.jpg/1280px-Dublin_-_Ha%27penny_Bridge_-_20100613-0033.jpg' },
    brussels: { name: 'Brussels', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Grand_Place%2C_Brussels%2C_Belgium.jpg/1280px-Grand_Place%2C_Brussels%2C_Belgium.jpg' },
    valencia: { name: 'Valencia', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/8d/Valencia_city_of_arts_and_sciences.jpg/1280px-Valencia_city_of_arts_and_sciences.jpg' },
    seville: { name: 'Seville', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Catedral_de_Sevilla_-_Giralda.jpg/1280px-Catedral_de_Sevilla_-_Giralda.jpg' },
    porto: { name: 'Porto', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/7B/Ribeira_Porto.jpg/1280px-Ribeira_Porto.jpg' },
    milan: { name: 'Milan', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/8e/Duomo_di_Milano_from_Piazza_del_Duomo.jpg/1280px-Duomo_di_Milano_from_Piazza_del_Duomo.jpg' },
    rome: { name: 'Rome', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/d/de/Colosseo_2020.jpg/1280px-Colosseo_2020.jpg' },
    florence: { name: 'Florence', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Duomo_di_Firenze.jpg/1280px-Duomo_di_Firenze.jpg' },
    bologna: { name: 'Bologna', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Bologna_piazza_maggiore.jpg/1280px-Bologna_piazza_maggiore.jpg' },
    munich: { name: 'Munich', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Muenchen_Frauenkirche.jpg/1280px-Muenchen_Frauenkirche.jpg' },
    hamburg: { name: 'Hamburg', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/27/Hamburg_-_Speicherstadt_%2816%29.jpg/1280px-Hamburg_-_Speicherstadt_%2816%29.jpg' },
    zurich: { name: 'Zurich', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Zurich_-_Grossm%C3%BCnster.jpg/1280px-Zurich_-_Grossm%C3%BCnster.jpg' },
    geneva: { name: 'Geneva', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/07/Geneva_and_the_Jet_d%27eau_from_above.jpg/1280px-Geneva_and_the_Jet_d%27eau_from_above.jpg' },
    rotterdam: { name: 'Rotterdam', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c4/Rotterdam_Skyline.jpg/1280px-Rotterdam_Skyline.jpg' },
    ghent: { name: 'Ghent', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/ab/Gent-Gravensteen_van_op_de_Leie.jpg/1280px-Gent-Gravensteen_van_op_de_Leie.jpg' },
    krakow: { name: 'Krakow', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Krakow_-_Rynek_Glowny_-_panoramio.jpg/1280px-Krakow_-_Rynek_Glowny_-_panoramio.jpg' },
    warsaw: { name: 'Warsaw', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/74/Warsaw_collage.jpg/1280px-Warsaw_collage.jpg' },
    tallinn: { name: 'Tallinn', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/33/Tallinn_old_town.jpg/1280px-Tallinn_old_town.jpg' },
    riga: { name: 'Riga', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/aa/Riga_panorama.jpg/1280px-Riga_panorama.jpg' },
    tbilisi: { name: 'Tbilisi', image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a7/Tbilisi-view.jpg/1280px-Tbilisi-view.jpg' }
  };

  const params = new URLSearchParams(location.search);
  let slug = (params.get('city') || '').toLowerCase().trim();
  if (slug === 'milano') slug = 'milan';
  const data = CITY_DATA[slug];
  if (!data) {
    window.location.replace('community.html');
    return;
  }

  const joinBase = 'community-join.html?city=' + encodeURIComponent(slug);
  const heroEl = document.getElementById('cityHero');
  const gradient = 'linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%)';
  function setHeroBg(url) {
    heroEl.style.backgroundImage = gradient + ', url(' + url + ')';
  }
  setHeroBg(data.image);
  heroEl.setAttribute('aria-label', data.name + ' city');

  document.getElementById('cityNameOverlay').textContent = data.name;
  document.title = data.name + ' community — Livvo';

  document.getElementById('labelErasmus').textContent = 'Erasmus ' + data.name;
  document.getElementById('labelNomads').textContent = 'Nomads ' + data.name;

  document.getElementById('joinRowErasmus').href = joinBase;
  document.getElementById('joinRowInterns').href = joinBase;
  document.getElementById('joinRowNomads').href = joinBase;

  const mainBtn = document.getElementById('joinCityMain');
  mainBtn.href = joinBase;
  mainBtn.textContent = 'Join ' + data.name + ' community';
})();
</script>
</body>
</html>
