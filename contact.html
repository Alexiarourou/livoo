<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talk to us — Livvo</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #059669; --green-light: #10b981; --green-dark: #047857;
  --bg: #f0f7f2; --surface: #ffffff; --border: #d4e5dc;
  --text: #1a2e24; --muted: #4a7c5e;
}
body { background: var(--bg); color: var(--text); font-family: "DM Sans", sans-serif; min-height: 100vh; }

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  height: 64px; padding: 0 48px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(255,255,255,0.95); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
.logo-icon { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, var(--green), var(--green-light)); display: flex; align-items: center; justify-content: center; }
.logo-word { font-family: "Outfit", sans-serif; font-weight: 800; font-size: 1.2rem; letter-spacing: -0.04em; }
.logo-word span { color: var(--green); }
.nav-back { font-size: 0.85rem; color: var(--muted); text-decoration: none; }
.nav-back:hover { color: var(--text); }

.page { max-width: 560px; margin: 0 auto; padding: 100px 24px 80px; }
.page h1 { font-family: "Outfit", sans-serif; font-weight: 800; font-size: 1.8rem; margin-bottom: 8px; }
.page .lead { font-size: 0.95rem; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }

.chatbox {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.06);
}
.chat-messages {
  height: 400px;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.msg {
  max-width: 85%;
  padding: 12px 18px;
  border-radius: 16px;
  font-size: 0.92rem;
  line-height: 1.5;
}
.msg.bot {
  align-self: flex-start;
  background: rgba(5,150,105,0.08);
  border: 1px solid rgba(5,150,105,0.15);
  color: var(--text);
}
.msg.user {
  align-self: flex-end;
  background: var(--green);
  color: white;
}
.msg .time { font-size: 0.7rem; opacity: 0.7; margin-top: 4px; }
.msg.user .time { opacity: 0.85; }

.quick-replies {
  padding: 0 24px 16px;
  display: flex; flex-wrap: wrap; gap: 8px;
}
.quick-btn {
  background: rgba(5,150,105,0.08);
  border: 1px solid rgba(5,150,105,0.2);
  border-radius: 20px;
  padding: 8px 16px;
  font-size: 0.82rem;
  color: var(--green);
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}
.quick-btn:hover { background: rgba(5,150,105,0.12); border-color: var(--green); }

.chat-input-wrap {
  padding: 16px 24px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 12px;
  align-items: flex-end;
}
.chat-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;
  font-family: inherit;
  font-size: 0.95rem;
  color: var(--text);
  resize: none;
  min-height: 48px;
  max-height: 120px;
  outline: none;
  transition: border-color 0.2s;
}
.chat-input:focus { border-color: var(--green); }
.chat-input::placeholder { color: var(--muted); }
.btn-send {
  background: var(--green);
  color: white;
  border: none;
  border-radius: 12px;
  padding: 14px 24px;
  font-family: inherit;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
}
.btn-send:hover { background: var(--green-dark); }
.btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

.typing {
  display: flex; gap: 4px; padding: 8px 0;
}
.typing span { width: 8px; height: 8px; background: var(--muted); border-radius: 50%; animation: bounce 1.4s ease-in-out infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,80%,100% { transform: scale(0.6); opacity: 0.5 } 40% { transform: scale(1); opacity: 1 } }

@media (max-width: 600px) { nav { padding: 0 20px; } .chat-messages { height: 320px; } }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <div class="logo-icon"><svg viewBox="0 0 18 18" fill="none" width="16" height="16"><path d="M2 3L9 15L16 3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <span class="logo-word">li<span>vv</span>o</span>
  </a>
  <a href="index.html" class="nav-back">← Back to home</a>
</nav>

<div class="page">
  <h1>Talk to us</h1>
  <p class="lead">Have a question? We're here to help. Start typing or pick a topic below.</p>

  <div class="chatbox">
    <div class="chat-messages" id="chatMessages"></div>
    <div class="quick-replies" id="quickReplies"></div>
    <div class="chat-input-wrap">
      <textarea class="chat-input" id="chatInput" placeholder="Type your message..." rows="1"></textarea>
      <button class="btn-send" id="btnSend">Send</button>
    </div>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('chatMessages');
  const inputEl = document.getElementById('chatInput');
  const sendBtn = document.getElementById('btnSend');
  const quickEl = document.getElementById('quickReplies');

  const QUICK_TOPICS = [
    'What is Livvo?',
    'Do I need a guarantor?',
    'Which cities do you cover?',
    'I\'m a landlord - how do I list?',
    'How do I find a flatmate?',
    'Pricing & fees'
  ];

  const AUTO_RESPONSES = {
    'livvo': 'Livvo helps students, interns and young professionals find flatshares and flatmates when moving abroad. No guarantor, flexible stays (1–12 months), and a community to connect before you arrive.',
    'guarantor': 'No! Livvo landlords understand that students and interns often can\'t provide a local guarantor. You verify through your university email or work placement letter instead.',
    'cities': 'We\'re live in Athens and expanding to Paris, London, Barcelona, Berlin, Amsterdam, Madrid, Milan, Lisbon, Dublin and more. Join the waitlist to be notified when we launch in your city.',
    'landlord': 'Sign up at livvo.com, verify your email, and list your property in minutes. You set the price and duration. We handle verification and matching with vetted tenants.',
    'flatmate': 'Create a free account, build your profile (budget, lifestyle, move-in date), and browse compatible flatmates in your city. You can connect before you even land!',
    'pricing': 'For tenants: Browse and connect are free. For landlords: We take a small service fee on bookings. Pricing is transparent on each listing.',
    'hello': 'Hi! 👋 How can I help you today?',
    'hi': 'Hi! 👋 How can I help you today?',
    'help': 'I\'m here to help! Ask about Livvo, guarantors, cities, listing as a landlord, or finding a flatmate. Or type your question below.',
    'thanks': 'You\'re welcome! Anything else I can help with?',
    'default': 'Thanks for your message! I\'ve shared it with our team. For quicker answers, check our <a href="faqs.html">FAQs</a> or try one of the topics above. We\'ll get back to you soon.'
  };

  function addMsg(text, isUser) {
    const div = document.createElement('div');
    div.className = 'msg ' + (isUser ? 'user' : 'bot');
    const now = new Date();
    const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
    div.innerHTML = text.replace(/\n/g, '<br>') + '<div class="time">' + time + '</div>';
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addTyping() {
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'typingMsg';
    div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typingMsg');
    if (el) el.remove();
  }

  function getResponse(text) {
    const lower = text.toLowerCase().trim();
    if (lower.match(/guarantor|guarante|cosign/)) return AUTO_RESPONSES.guarantor;
    if (lower.match(/cit(y|ies)|where|paris|london|athens|barcelona|expand/)) return AUTO_RESPONSES.cities;
    if (lower.match(/landlord|list|property|rent out/)) return AUTO_RESPONSES.landlord;
    if (lower.match(/flatmate|roommate|find (a|my) (flat)?mate/)) return AUTO_RESPONSES.flatmate;
    if (lower.match(/price|fee|cost|how much/)) return AUTO_RESPONSES.pricing;
    if (lower.match(/^(hi|hey|hello|hola)\s*[!.]?$/)) return AUTO_RESPONSES.hello;
    if (lower.match(/what is livvo|livvo\?/)) return AUTO_RESPONSES.livvo;
    if (lower.match(/help|support/)) return AUTO_RESPONSES.help;
    if (lower.match(/thank|thanks|cheers/)) return AUTO_RESPONSES.thanks;
    return AUTO_RESPONSES.default;
  }

  function sendUserMessage(text) {
    if (!text.trim()) return;
    addMsg(text, true);
    inputEl.value = '';
    inputEl.style.height = 'auto';
    quickEl.innerHTML = '';

    addTyping();
    setTimeout(() => {
      removeTyping();
      const reply = getResponse(text);
      addMsg(reply, false);
      renderQuickReplies();
    }, 600 + Math.random() * 400);
  }

  function renderQuickReplies() {
    quickEl.innerHTML = QUICK_TOPICS.map(t => 
      '<button class="quick-btn" data-msg="' + t.replace(/"/g, '&quot;') + '">' + t + '</button>'
    ).join('');
    quickEl.querySelectorAll('.quick-btn').forEach(btn => {
      btn.addEventListener('click', () => sendUserMessage(btn.dataset.msg));
    });
  }

  addMsg('Hi! I\'m the Livvo support assistant. 👋\n\nWhat would you like to know? You can ask about flatshares, flatmates, guarantors, cities, or how to list your property.', false);
  renderQuickReplies();

  sendBtn.addEventListener('click', () => sendUserMessage(inputEl.value.trim()));

  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendUserMessage(this.value.trim());
    }
  });

  inputEl.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
</script>
</body>
</html>
