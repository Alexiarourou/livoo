<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talk to us — Livvo</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #059669; --green-light: #10b981; --green-dark: #047857;
  --bg: #f0f7f2; --surface: #ffffff; --border: #d4e5dc;
  --text: #1a2e24; --muted: #4a7c5e;
}
body { background: var(--bg); color: var(--text); font-family: "DM Sans", sans-serif; min-height: 100vh; }

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  height: 64px; padding: 0 48px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(255,255,255,0.95); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
.logo-icon { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, var(--green), var(--green-light)); display: flex; align-items: center; justify-content: center; }
.logo-word { font-family: "Outfit", sans-serif; font-weight: 800; font-size: 1.2rem; letter-spacing: -0.04em; }
.logo-word span { color: var(--green); }
.nav-back { font-size: 0.85rem; color: var(--muted); text-decoration: none; }
.nav-back:hover { color: var(--text); }

.page { max-width: 560px; margin: 0 auto; padding: 100px 24px 80px; }
.page h1 { font-family: "Outfit", sans-serif; font-weight: 800; font-size: 1.8rem; margin-bottom: 8px; }
.page .lead { font-size: 0.95rem; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }

.chatbox {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.06);
}
.chat-messages {
  height: 400px;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.msg {
  max-width: 85%;
  padding: 12px 18px;
  border-radius: 16px;
  font-size: 0.92rem;
  line-height: 1.5;
}
.msg.bot {
  align-self: flex-start;
  background: rgba(5,150,105,0.08);
  border: 1px solid rgba(5,150,105,0.15);
  color: var(--text);
}
.msg.user {
  align-self: flex-end;
  background: var(--green);
  color: white;
}
.msg .time { font-size: 0.7rem; opacity: 0.7; margin-top: 4px; }
.msg.user .time { opacity: 0.85; }

.quick-replies {
  padding: 0 24px 16px;
  display: flex; flex-wrap: wrap; gap: 8px;
}
.quick-btn {
  background: rgba(5,150,105,0.08);
  border: 1px solid rgba(5,150,105,0.2);
  border-radius: 20px;
  padding: 8px 16px;
  font-size: 0.82rem;
  color: var(--green);
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}
.quick-btn:hover { background: rgba(5,150,105,0.12); border-color: var(--green); }

.chat-input-wrap {
  padding: 16px 24px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 12px;
  align-items: flex-end;
}
.chat-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;
  font-family: inherit;
  font-size: 0.95rem;
  color: var(--text);
  resize: none;
  min-height: 48px;
  max-height: 120px;
  outline: none;
  transition: border-color 0.2s;
}
.chat-input:focus { border-color: var(--green); }
.chat-input::placeholder { color: var(--muted); }
.btn-send {
  background: var(--green);
  color: white;
  border: none;
  border-radius: 12px;
  padding: 14px 24px;
  font-family: inherit;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
}
.btn-send:hover { background: var(--green-dark); }
.btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

.typing {
  display: flex; gap: 4px; padding: 8px 0;
}
.typing span { width: 8px; height: 8px; background: var(--muted); border-radius: 50%; animation: bounce 1.4s ease-in-out infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,80%,100% { transform: scale(0.6); opacity: 0.5 } 40% { transform: scale(1); opacity: 1 } }

@media (max-width: 600px) { nav { padding: 0 20px; } .chat-messages { height: 320px; } }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <div class="logo-icon"><svg viewBox="0 0 18 18" fill="none" width="16" height="16"><path d="M2 3L9 15L16 3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <span class="logo-word">li<span>vv</span>o</span>
  </a>
  <a href="index.html" class="nav-back">← Back to home</a>
</nav>

<div class="page">
  <h1>Talk to us</h1>
  <p class="lead">Have a question? We're here to help. Start typing or pick a topic below.</p>

  <div class="chatbox">
    <div class="chat-messages" id="chatMessages"></div>
    <div class="quick-replies" id="quickReplies"></div>
    <div class="chat-input-wrap">
      <textarea class="chat-input" id="chatInput" placeholder="Type your message..." rows="1"></textarea>
      <button class="btn-send" id="btnSend">Send</button>
    </div>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('chatMessages');
  const inputEl = document.getElementById('chatInput');
  const sendBtn = document.getElementById('btnSend');
  const quickEl = document.getElementById('quickReplies');

  const SUPPORT_EMAIL = 'hello@livvo.net';

  const TOPICS = [
    { id: 'rentals', label: 'Rentals & booking' },
    { id: 'community', label: 'Community posts' },
    { id: 'account', label: 'Account / login' },
    { id: 'landlord', label: 'Landlord listing' },
    { id: 'bug', label: 'Report a bug' }
  ];

  const FLOW_QUESTIONS = {
    rentals: [
      { key: 'city', prompt: 'Which city is this about?' },
      { key: 'stage', prompt: 'What stage are you at? (browsing / booking / move-in)' },
      { key: 'details', prompt: 'What exactly do you need help with?' }
    ],
    community: [
      { key: 'city', prompt: 'Which city community is this for?' },
      { key: 'issue', prompt: 'Is this about posting, comments, or moderation?' },
      { key: 'details', prompt: 'Share a short description of the issue.' }
    ],
    account: [
      { key: 'issue', prompt: 'Is it login, signup, password reset, or profile setup?' },
      { key: 'email', prompt: 'What email are you using? (optional)' },
      { key: 'details', prompt: 'What error do you see?' }
    ],
    landlord: [
      { key: 'city', prompt: 'Which city is your property in?' },
      { key: 'units', prompt: 'How many listings do you plan to add?' },
      { key: 'details', prompt: 'What do you need help with in listing flow?' }
    ],
    bug: [
      { key: 'page', prompt: 'Which page is broken? (URL or page name)' },
      { key: 'device', prompt: 'Which device/browser are you using?' },
      { key: 'details', prompt: 'What happened vs what you expected?' }
    ]
  };

  const QUICK_ANSWERS = {
    rentals: 'For bookings and rentals, we recommend sharing city + timeline so we can route this faster.',
    community: 'Community posts are city-specific. Include city and whether this is create/read/comment issue.',
    account: 'For account help, include your login method (email/password or Google) and the exact error text.',
    landlord: 'Landlord onboarding is quickest when you share city and listing count.',
    bug: 'Bug reports are much faster with page URL and browser/device details.'
  };

  const state = {
    stage: 'topic',
    topic: null,
    answers: {},
    questionIndex: 0
  };

  function timestamp() {
    const now = new Date();
    return now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
  }

  function addMsg(text, isUser) {
    const div = document.createElement('div');
    div.className = 'msg ' + (isUser ? 'user' : 'bot');
    const body = document.createElement('div');
    body.innerHTML = String(text).replace(/\n/g, '<br>');
    const t = document.createElement('div');
    t.className = 'time';
    t.textContent = timestamp();
    div.appendChild(body);
    div.appendChild(t);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addTyping() {
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'typingMsg';
    div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typingMsg');
    if (el) el.remove();
  }

  function setQuickReplies(items, onPick) {
    quickEl.innerHTML = '';
    items.forEach(function (item) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'quick-btn';
      btn.textContent = item.label;
      btn.addEventListener('click', function () {
        onPick(item);
      });
      quickEl.appendChild(btn);
    });
  }

  function askCurrentQuestion() {
    const q = FLOW_QUESTIONS[state.topic][state.questionIndex];
    if (!q) {
      finishFlow();
      return;
    }
    addTyping();
    setTimeout(function () {
      removeTyping();
      addMsg(q.prompt, false);
    }, 300);
  }

  function beginTopic(topicId, topicLabel) {
    state.stage = 'question';
    state.topic = topicId;
    state.answers = { topic: topicLabel };
    state.questionIndex = 0;
    addTyping();
    setTimeout(function () {
      removeTyping();
      addMsg(QUICK_ANSWERS[topicId], false);
      askCurrentQuestion();
      setQuickReplies([
        { id: 'human', label: 'Contact human' },
        { id: 'restart', label: 'Start over' }
      ], function (choice) {
        if (choice.id === 'human') {
          finishFlow();
        } else {
          resetFlow();
        }
      });
    }, 350);
  }

  function finishFlow() {
    const lines = [];
    lines.push('Topic: ' + (state.answers.topic || 'General'));
    Object.keys(state.answers).forEach(function (k) {
      if (k === 'topic') return;
      lines.push(k + ': ' + state.answers[k]);
    });
    const subject = '[Support] ' + (state.answers.topic || 'General question');
    const body = 'Hi Livvo team,%0D%0A%0D%0AI need help with:%0D%0A' + encodeURIComponent(lines.join('\n')) + '%0D%0A%0D%0AThanks!';
    addTyping();
    setTimeout(function () {
      removeTyping();
      addMsg('Thanks — I collected the key details. You can now send this directly to our team.', false);
      quickEl.innerHTML = '';
      const mailBtn = document.createElement('button');
      mailBtn.type = 'button';
      mailBtn.className = 'quick-btn';
      mailBtn.textContent = 'Open email draft';
      mailBtn.addEventListener('click', function () {
        const url = 'mailto:' + SUPPORT_EMAIL + '?subject=' + encodeURIComponent(subject) + '&body=' + body;
        window.location.href = url;
      });
      const restartBtn = document.createElement('button');
      restartBtn.type = 'button';
      restartBtn.className = 'quick-btn';
      restartBtn.textContent = 'Ask another question';
      restartBtn.addEventListener('click', resetFlow);
      quickEl.appendChild(mailBtn);
      quickEl.appendChild(restartBtn);
      state.stage = 'done';
    }, 350);
  }

  function resetFlow() {
    state.stage = 'topic';
    state.topic = null;
    state.answers = {};
    state.questionIndex = 0;
    addMsg('Pick a topic and I will ask a few quick questions to route your request.', false);
    setQuickReplies(TOPICS, function (topic) {
      addMsg(topic.label, true);
      beginTopic(topic.id, topic.label);
    });
  }

  function handleUserText(text) {
    if (!text.trim()) return;
    addMsg(text, true);
    inputEl.value = '';
    inputEl.style.height = 'auto';

    if (state.stage === 'topic') {
      const lower = text.toLowerCase();
      const match = TOPICS.find(function (t) {
        return lower.includes(t.id) || lower.includes(t.label.toLowerCase().split(' ')[0]);
      });
      if (match) {
        beginTopic(match.id, match.label);
      } else {
        addMsg('Please pick one topic above so I can ask the right follow-up questions.', false);
      }
      return;
    }

    if (state.stage === 'question') {
      const q = FLOW_QUESTIONS[state.topic][state.questionIndex];
      if (!q) {
        finishFlow();
        return;
      }
      state.answers[q.key] = text.trim();
      state.questionIndex += 1;
      askCurrentQuestion();
      return;
    }

    addMsg('Use "Ask another question" to start a new support flow.', false);
  }

  addMsg('Hi! I am the Livvo support assistant. I can guide you through a few quick questions and prepare a support draft for our team.', false);
  resetFlow();

  sendBtn.addEventListener('click', function () {
    handleUserText(inputEl.value.trim());
  });

  inputEl.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleUserText(this.value.trim());
    }
  });

  inputEl.addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
</script>
</body>
</html>
