<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find a Flatmate — Livvo</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #059669; --green-light: #10b981; --green-dark: #047857;
  --bg-dark: #f0f7f2; --surface-dark: #ffffff; --border-dark: #d4e5dc;
  --text-dark: #1a2e24; --muted-dark: #4a7c5e;
}
html { scroll-behavior: smooth; }
body { background: var(--bg-dark); color: var(--text-dark); font-family: "DM Sans", sans-serif; min-height: 100vh; }

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  height: 64px; padding: 0 48px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(255,255,255,0.95); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border-dark);
}
.logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
.logo-icon { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, var(--green), var(--green-light)); display: flex; align-items: center; justify-content: center; }
.logo-word { font-family: "Outfit", sans-serif; font-weight: 800; font-size: 1.2rem; letter-spacing: -0.04em; color: var(--text-dark); }
.logo-word span { color: var(--green); }
.nav-back { font-size: 0.83rem; color: var(--muted-dark); text-decoration: none; }
.nav-back:hover { color: var(--text-dark); }

.page { min-height: 100vh; padding: 100px 24px 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.auth-card {
  width: 100%; max-width: 420px;
  background: var(--surface-dark);
  border: 1px solid var(--border-dark);
  border-radius: 20px;
  padding: 40px 36px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.06);
}
.auth-card h1 { font-family: "Outfit", sans-serif; font-weight: 800; font-size: 1.5rem; letter-spacing: -0.03em; margin-bottom: 8px; }
.auth-card .sub { font-size: 0.88rem; color: var(--muted-dark); margin-bottom: 28px; line-height: 1.5; }

.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--muted-dark); margin-bottom: 8px; }
.form-group input {
  width: 100%; background: #ffffff;
  border: 1px solid var(--border-dark);
  border-radius: 10px;
  padding: 14px 16px;
  font-family: "DM Sans", sans-serif; font-size: 0.95rem;
  color: var(--text-dark);
  outline: none;
  transition: border-color 0.2s;
}
.form-group input::placeholder { color: var(--muted-dark); opacity: 0.7; }
.form-group input:focus { border-color: var(--green); }

.btn-primary {
  width: 100%; background: var(--green);
  color: white; border: none;
  border-radius: 10px;
  padding: 14px;
  font-family: "DM Sans", sans-serif; font-size: 0.95rem; font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
}
.btn-primary:hover { background: var(--green-dark); transform: translateY(-1px); }

.auth-footer { margin-top: 24px; text-align: center; font-size: 0.85rem; color: var(--muted-dark); }
.auth-footer a { color: var(--green); text-decoration: none; font-weight: 600; }
.auth-footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <div class="logo-icon"><svg viewBox="0 0 18 18" fill="none" width="16" height="16"><path d="M2 3L9 15L16 3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <span class="logo-word">li<span>vv</span>o</span>
  </a>
  <a href="index.html" class="nav-back" id="navBack">← Back to home</a>
</nav>

<div class="page">
  <div class="auth-card">
    <h1 id="authTitle">Find your flatmate</h1>
    <p class="sub" id="authSub">Create a free account to match with compatible people based on budget, lifestyle, nationality and move-in date.</p>
    <form id="signupForm">
      <input type="hidden" name="_subject" value="Flatmate signup — Livvo" />
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Min. 8 characters" required minlength="8" autocomplete="new-password" />
      </div>
      <button type="submit" class="btn-primary">Create account</button>
    </form>
    <p id="formSuccess" style="display:none;padding:16px;border-radius:10px;background:rgba(5,150,105,0.1);border:1px solid rgba(5,150,105,0.2);color:var(--green-dark);font-size:0.95rem;line-height:1.5;text-align:center;margin-top:8px;">Thanks! We&apos;ll be in touch shortly to complete your account setup.</p>
  </div>
  <p class="auth-footer">Already have an account? <a href="flatmate-login.html">Log in</a></p>
</div>

<script>
  const params = new URLSearchParams(location.search);
  const redirect = params.get('redirect') || '';
  const isCommunity = redirect.includes('community-feed') || params.get('source') === 'community';
  if (isCommunity) {
    document.title = 'Join the Community — Livvo';
    document.getElementById('authTitle').textContent = 'Join the community';
    document.getElementById('authSub').textContent = 'Create a free account to join the forum, chat with others, and connect with people in your city.';
    document.getElementById('navBack').textContent = '← Back to cities';
    document.getElementById('navBack').href = params.get('city') ? 'community-join.html?city=' + params.get('city') : 'community.html';
  }
</script>
<script>
  (function () {
    const FS = 'https://formspree.io/f/mbdzykvg';
    const form = document.getElementById('signupForm');
    const successEl = document.getElementById('formSuccess');
    form.addEventListener('submit', function (e) {
      e.preventDefault();
      const btn = form.querySelector('button[type="submit"]');
      const fd = new FormData(form);
      fd.delete('password');
      const q = new URLSearchParams(location.search);
      if (q.get('city')) fd.append('signup_city', q.get('city'));
      if (q.get('audience')) fd.append('signup_audience', q.get('audience'));
      if (q.get('redirect')) fd.append('signup_redirect', q.get('redirect'));
      btn.disabled = true;
      fetch(FS, { method: 'POST', body: fd, headers: { Accept: 'application/json' } })
        .then(function (res) { return res.json().then(function (data) { return { res: res, data: data }; }); })
        .then(function (_ref) {
          if (!_ref.res.ok) throw new Error((_ref.data && _ref.data.error) || 'Submit failed');
          var email = (form.querySelector('[name="email"]') || {}).value;
          if (email) {
            localStorage.setItem('livvo_flatmate_email', email.trim());
            localStorage.setItem('livvo_flatmate_logged_in', '1');
          }
          form.style.display = 'none';
          successEl.style.display = 'block';
        })
        .catch(function () {
          alert('Something went wrong. Please try again.');
        })
        .finally(function () { btn.disabled = false; });
    });
  })();
</script>
</body>
</html>
