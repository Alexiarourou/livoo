<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find a Flatmate — Livvo</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #059669; --green-light: #10b981; --green-dark: #047857;
  --bg-dark: #f0f7f2; --surface-dark: #ffffff; --border-dark: #d4e5dc;
  --text-dark: #1a2e24; --muted-dark: #4a7c5e;
}
html { scroll-behavior: smooth; }
body { background: var(--bg-dark); color: var(--text-dark); font-family: "DM Sans", sans-serif; min-height: 100vh; }

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  height: 64px; padding: 0 48px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(255,255,255,0.95); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border-dark);
}
.logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
.logo-icon { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, var(--green), var(--green-light)); display: flex; align-items: center; justify-content: center; }
.logo-word { font-family: "Outfit", sans-serif; font-weight: 800; font-size: 1.2rem; letter-spacing: -0.04em; color: var(--text-dark); }
.logo-word span { color: var(--green); }
.nav-back { font-size: 0.83rem; color: var(--muted-dark); text-decoration: none; }
.nav-back:hover { color: var(--text-dark); }

.page { min-height: 100vh; padding: 100px 24px 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.auth-card {
  width: 100%; max-width: 420px;
  background: var(--surface-dark);
  border: 1px solid var(--border-dark);
  border-radius: 20px;
  padding: 40px 36px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.06);
}
.auth-card h1 { font-family: "Outfit", sans-serif; font-weight: 800; font-size: 1.5rem; letter-spacing: -0.03em; margin-bottom: 8px; }
.auth-card .sub { font-size: 0.88rem; color: var(--muted-dark); margin-bottom: 28px; line-height: 1.5; }

.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--muted-dark); margin-bottom: 8px; }
.form-group input {
  width: 100%; background: #ffffff;
  border: 1px solid var(--border-dark);
  border-radius: 10px;
  padding: 14px 16px;
  font-family: "DM Sans", sans-serif; font-size: 0.95rem;
  color: var(--text-dark);
  outline: none;
  transition: border-color 0.2s;
}
.form-group input::placeholder { color: var(--muted-dark); opacity: 0.7; }
.form-group input:focus { border-color: var(--green); }

.btn-primary {
  width: 100%; background: var(--green);
  color: white; border: none;
  border-radius: 10px;
  padding: 14px;
  font-family: "DM Sans", sans-serif; font-size: 0.95rem; font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
}
.btn-primary:hover { background: var(--green-dark); transform: translateY(-1px); }

.auth-footer { margin-top: 24px; text-align: center; font-size: 0.85rem; color: var(--muted-dark); }
.auth-footer a { color: var(--green); text-decoration: none; font-weight: 600; }
.auth-footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <div class="logo-icon"><svg viewBox="0 0 18 18" fill="none" width="16" height="16"><path d="M2 3L9 15L16 3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <span class="logo-word">li<span>vv</span>o</span>
  </a>
  <a href="index.html" class="nav-back">← Back to home</a>
</nav>

<div class="page">
  <div class="auth-card">
    <h1>Find your flatmate</h1>
    <p class="sub">Create a free account to match with compatible people based on budget, lifestyle, nationality and move-in date.</p>
    <form id="signupForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Min. 8 characters" required minlength="8" />
      </div>
      <button type="submit" class="btn-primary">Create account</button>
    </form>
  </div>
  <p class="auth-footer">Already have an account? <a href="flatmate-login.html">Log in</a></p>
</div>

<script src="firebase-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script>
  const form = document.getElementById('signupForm');
  let auth = null;
  if (isFirebaseConfigured()) {
    try {
      firebase.initializeApp(LIVVO_FIREBASE_CONFIG);
      auth = firebase.auth();
    } catch (e) { /* ignore */ }
  }

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    const email = this.email.value.trim();
    const password = this.password.value;
    const btn = this.querySelector('button[type="submit"]');

    if (auth) {
      btn.disabled = true;
      try {
        await auth.createUserWithEmailAndPassword(email, password);
        localStorage.setItem('livvo_flatmate_email', email);
        localStorage.setItem('livvo_flatmate_logged_in', '1');
        const redirect = new URLSearchParams(location.search).get('redirect');
        window.location.href = redirect || 'flatmate-profile.html';
      } catch (err) {
        btn.disabled = false;
        if (err.code === 'auth/email-already-in-use') {
          alert('An account with this email already exists. Log in or use Forgot password.');
        } else if (err.code === 'auth/weak-password') {
          alert('Password should be at least 6 characters.');
        } else {
          alert(err.message || 'Sign up failed. Please try again.');
        }
      }
    } else {
      localStorage.setItem('livvo_flatmate_email', email);
      localStorage.setItem('livvo_flatmate_password', password);
      localStorage.setItem('livvo_flatmate_logged_in', '1');
      const redirect = new URLSearchParams(location.search).get('redirect');
      window.location.href = redirect || 'flatmate-profile.html';
    }
  });
</script>
</body>
</html>
