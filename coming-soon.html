<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming soon | Livvo</title>
<meta name="description" content="Livvo is launching soon. Join the waitlist to get early access.">
<link rel="canonical" href="https://livvo.net/coming-soon.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Livvo">
<meta property="og:title" content="Coming soon | Livvo">
<meta property="og:description" content="Livvo is launching soon. Join the waitlist to get early access.">
<meta property="og:image" content="https://livvo.net/img/cities/athens.jpg">
<meta property="og:url" content="https://livvo.net/coming-soon.html">
<meta property="og:locale" content="en_GB">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Coming soon | Livvo">
<meta name="twitter:description" content="Livvo is launching soon. Join the waitlist to get early access.">
<meta name="twitter:image" content="https://livvo.net/img/cities/athens.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="livvo-base.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #059669; --green-light: #10b981; --green-dark: #047857;
  --bg-dark: #f0f7f2; --surface-dark: #ffffff; --border-dark: #d4e5dc;
  --text-dark: #1a2e24; --muted-dark: #4a7c5e;
}
html { scroll-behavior: smooth; }
body { background: var(--bg-dark); color: var(--text-dark); font-family: "DM Sans", sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; }

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  height: 64px; padding: 0 48px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(255,255,255,0.95); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border-dark);
}
.logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
.logo-icon { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, var(--green), var(--green-light)); display: flex; align-items: center; justify-content: center; }
.logo-word { font-family: "Sora", sans-serif; font-weight: 800; font-size: 1.2rem; letter-spacing: -0.04em; color: var(--text-dark); }
.logo-word span { color: var(--green); }
.nav-back { font-size: 0.83rem; color: var(--muted-dark); text-decoration: none; display: flex; align-items: center; gap: 6px; }
.nav-back:hover { color: var(--text-dark); }

.page { max-width: 520px; padding-top: 100px; }
.badge { display: inline-block; background: rgba(5,150,105,0.12); border: 1px solid rgba(5,150,105,0.25); color: var(--green); padding: 8px 18px; border-radius: 100px; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 24px; }
h1 { font-family: "Sora", sans-serif; font-weight: 900; font-size: clamp(2rem, 5vw, 3rem); letter-spacing: -0.04em; line-height: 1.15; margin-bottom: 16px; }
h1 em { font-style: normal; background: linear-gradient(135deg, var(--green), var(--green-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
p { font-size: 1.05rem; line-height: 1.7; color: var(--muted-dark); margin-bottom: 32px; }
.btn { display: inline-block; background: var(--green); color: white; padding: 14px 28px; border-radius: 10px; font-size: 0.95rem; font-weight: 600; text-decoration: none; transition: all 0.2s; }
.btn:hover { background: var(--green-dark); transform: translateY(-1px); }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <div class="logo-icon"><svg viewBox="0 0 18 18" fill="none" width="16" height="16"><path d="M2 3L9 15L16 3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <span class="logo-word">li<span>vv</span>o</span>
  </a>
  <a href="index.html" class="nav-back">← Back to home</a>
</nav>

<div class="page">
  <div class="badge">Coming soon</div>
  <h1>We're on our way to <em id="cityName">your city</em>.</h1>
  <p id="message">Livvo is expanding across Europe. Join the waitlist and we'll let you know the moment we launch.</p>
  <a href="index.html#waitlist" class="btn">Get notified when we launch</a>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const city = params.get('city') || '';
  if (city) {
    document.getElementById('cityName').textContent = city + '.';
    document.getElementById('message').textContent = 'Livvo is coming to ' + city + ' soon. Students, interns and nomads — your new home base is on the way. Join the waitlist and we\'ll let you know the moment we launch.';
  }
</script>
</body>
</html>
