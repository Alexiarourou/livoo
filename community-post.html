<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post | Livvo</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23059669'/><path d='M8 12l8 12 8-12-4-6H12z' stroke='white' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #059669;
      --btn-green: #1a7a4a;
      --btn-green-hover: #156b42;
      --bg: #edf7f0;
      --surface: #ffffff;
      --border: #d4e5dc;
      --text: #1a2e24;
      --muted: #4a7c5e;
    }
    body { background: var(--bg); color: var(--text); font-family: "DM Sans", sans-serif; min-height: 100vh; }
    .thread-page { max-width: 720px; margin: 0 auto; padding: 88px 20px 48px; }
    .thread-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--btn-green);
      font-weight: 700;
      font-size: 0.95rem;
      text-decoration: none;
      margin-bottom: 20px;
    }
    .thread-back:hover { text-decoration: underline; }
    .post-card {
      background: var(--surface);
      border: 1px solid #d4eadb;
      border-radius: 16px;
      padding: 22px;
      margin-bottom: 20px;
    }
    .post-card h1 {
      font-family: "Sora", sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 10px;
    }
    .post-cat {
      display: inline-flex;
      align-items: center;
      font-size: 12px;
      padding: 2px 10px;
      border-radius: 999px;
      background: #f2f6f4;
      border: 1px solid #e1ebe5;
      color: #666;
      margin-bottom: 14px;
    }
    .post-author {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .post-author-av {
      width: 40px; height: 40px; border-radius: 50%; overflow: hidden;
      background: #059669; color: #fff; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; flex-shrink: 0;
    }
    .post-author-av img { width: 100%; height: 100%; object-fit: cover; }
    .post-author-meta { font-size: 0.88rem; color: #666; }
    .post-body-text { font-size: 1rem; line-height: 1.6; color: var(--text); white-space: pre-wrap; }
    .thread-top-pills {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      margin: 18px 0 0;
    }
    .thread-pill {
      border: 1px solid #d6e8dc; background: #f6fbf8; color: #2f4f3d;
      border-radius: 999px; padding: 8px 12px; font-size: 13px; font-weight: 700;
      display: inline-flex; align-items: center; gap: 4px; cursor: pointer; font: inherit;
    }
    .thread-join-trigger {
      width: 100%; border: 1px solid #cfe4d7; border-radius: 999px; background: #fff;
      color: #5d7467; padding: 11px 14px; text-align: left; font: inherit; cursor: text;
      margin-top: 16px;
    }
    .thread-composer-panel {
      margin-top: 8px; border: 1px solid #d7e9dd; border-radius: 10px; background: #fff; padding: 10px;
    }
    .thread-composer-text {
      width: 100%; min-height: 90px; padding: 12px; border: 1px solid #c5e0d0; border-radius: 8px;
      resize: vertical; font: inherit;
    }
    .thread-composer-text:focus {
      outline: none; border-color: var(--btn-green);
      box-shadow: 0 0 0 3px rgba(26, 122, 74, 0.12);
    }
    .thread-composer-toolbar {
      margin-top: 8px; display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .thread-toolbar-left { display: inline-flex; align-items: center; gap: 6px; }
    .thread-toolbar-btn {
      border: 1px solid #d7e9dd; background: #fff; color: #335443;
      border-radius: 8px; padding: 4px 8px; font-size: 12px; font-weight: 700; cursor: pointer;
    }
    .thread-toolbar-actions { display: inline-flex; align-items: center; gap: 8px; }
    .btn-primary {
      font-family: inherit; font-size: 0.9rem; font-weight: 600; padding: 10px 18px;
      border-radius: 10px; border: none; background: var(--btn-green); color: #fff; cursor: pointer;
    }
    .btn-primary:hover { background: var(--btn-green-hover); }
    .btn-secondary {
      font-family: inherit; font-size: 0.9rem; font-weight: 600; padding: 10px 18px;
      border-radius: 10px; border: 1px solid var(--border); background: #fff; color: var(--text); cursor: pointer;
    }
    .sort-row { margin: 20px 0 12px; }
    .sort-row select {
      border: 1px solid #d7e9dd; border-radius: 8px; padding: 8px 12px; font: inherit; font-size: 14px;
    }
    .comment-item {
      display: flex; gap: 10px; align-items: flex-start; margin-bottom: 12px;
      border-radius: 10px; padding: 8px;
    }
    .comment-highlight { background: #fff9e8; }
    .comment-meta { font-size: 0.86rem; color: #666; margin-bottom: 4px; }
    .comment-body { font-size: 0.95rem; line-height: 1.5; }
    .comment-actions-row { margin-top: 6px; display: flex; align-items: center; gap: 10px; color: #627a6d; font-size: 12px; }
    .comment-action-link {
      border: none; background: transparent; color: #627a6d; font-size: 12px; font-weight: 700;
      cursor: pointer; padding: 0;
    }
    .comment-action-link:hover { color: var(--btn-green); }
    .nested-reply {
      margin-left: 36px; margin-top: 8px; border-left: 2px solid #dcebe2; padding-left: 10px;
    }
    .reply-actions-row { display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; }
    .reply-cancel-link {
      border: none; background: transparent; color: #60776a; font-size: 13px; font-weight: 600;
      cursor: pointer; padding: 8px 4px;
    }
    .comment-more-wrap { position: relative; display: inline-flex; }
    .comment-more-menu {
      position: absolute; right: 0; top: calc(100% + 4px); min-width: 120px;
      background: #fff; border: 1px solid var(--border); border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08); padding: 6px; z-index: 50;
    }
    .comment-more-menu[hidden] { display: none !important; }
    .comment-more-menu button {
      display: block; width: 100%; text-align: left; padding: 8px 10px; border: none; border-radius: 6px;
      background: transparent; font: inherit; font-size: 13px; font-weight: 600; color: #b42318; cursor: pointer;
    }
    .comment-more-menu button:hover { background: #fef2f2; }
    .feed-empty, .meta-pill { text-align: center; color: var(--muted); padding: 24px; }
    .meta-pill { text-align: left; padding: 0; font-size: 0.88rem; }
    #post-like-btn.liked svg path { fill: #e53e3e; stroke: #e53e3e; }
    #post-like-btn.liked { color: #e53e3e !important; background: #fff0f0 !important; }
    #post-author-avatar img { width: 100%; height: 100%; object-fit: cover; }
  </style>
</head>
<body>
  <main class="thread-page" style="max-width: none; padding: 88px 0 48px;">
    <div id="loading" class="meta-pill" style="max-width: 740px; margin: 0 auto; padding: 0 16px;">Loading…</div>
    <p id="err-msg" class="feed-empty" style="max-width: 740px; margin: 0 auto; padding: 0 16px;" hidden></p>
    <div id="post-shell" hidden>
      <div style="max-width: 740px; margin: 0 auto; padding: 24px 16px;">
        <a href="javascript:history.back()" style="display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; color: #2d6a2d; text-decoration: none; margin-bottom: 20px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
          Back
        </a>
        <div style="background: white; border: 1px solid #e8f0e8; border-radius: 16px; padding: 24px; margin-bottom: 16px;">
          <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 16px;">
            <div id="post-author-avatar" style="flex-shrink: 0; width: 40px; height: 40px; border-radius: 50%; overflow: hidden; background: #059669; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px;"></div>
            <div style="flex: 1; min-width: 0;">
              <span style="font-size: 13px; font-weight: 600; color: #1a2e1a;" id="post-author-name"></span>
              <span style="font-size: 12px; color: #9ab09a; margin-left: 6px;" id="post-timestamp"></span>
            </div>
            <span id="post-category-tag" style="margin-left: auto; font-size: 11px; background: #f0f7f0; color: #2d6a2d; padding: 3px 10px; border-radius: 20px; font-weight: 600; flex-shrink: 0;"></span>
          </div>
          <h1 style="font-size: 22px; font-weight: 800; color: #1a2e1a; margin: 0 0 8px 0; line-height: 1.3;" id="post-title"></h1>
          <p style="font-size: 15px; color: #3d5a3d; line-height: 1.7; margin: 0 0 20px 0; white-space: pre-wrap;" id="post-body"></p>
          <div style="display: flex; align-items: center; gap: 8px; padding-top: 16px; border-top: 1px solid #f0f5f0;">
            <button type="button" id="post-like-btn" onclick="likePost()"
              style="display: flex; align-items: center; gap: 5px; border: none; background: #f5f5f5; border-radius: 20px; padding: 7px 14px; cursor: pointer; font-size: 13px; color: #5a7a5a; transition: all 0.15s;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
              <span id="post-like-count">0</span>
            </button>
            <span style="font-size: 13px; color: #9ab09a; display: flex; align-items: center; gap: 5px;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              <span id="post-comment-count">0</span> comments
            </span>
          </div>
        </div>
        <div style="background: white; border: 1px solid #e8f0e8; border-radius: 16px; padding: 16px; margin-bottom: 24px;">
          <textarea id="comment-input" placeholder="Share your thoughts..."
            style="width: 100%; border: none; outline: none; font-size: 14px; color: #1a2e1a; resize: none; min-height: 80px; font-family: inherit; background: transparent; box-sizing: border-box;"
            oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
          <div style="display: flex; justify-content: flex-end; gap: 8px; padding-top: 10px; border-top: 1px solid #f0f5f0; margin-top: 8px;">
            <button type="button" onclick="cancelComment()" style="border: 1px solid #e8f0e8; background: white; border-radius: 20px; padding: 7px 16px; font-size: 13px; color: #5a7a5a; cursor: pointer;">Cancel</button>
            <button type="button" onclick="submitComment()" style="border: none; background: #2d6a2d; color: white; border-radius: 20px; padding: 7px 16px; font-size: 13px; font-weight: 600; cursor: pointer;">Comment</button>
          </div>
        </div>
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 16px;">
          <span style="font-size: 13px; font-weight: 600; color: #1a2e1a;">Sort:</span>
          <select id="sort-comments" style="font-size: 13px; border: 1.5px solid #e8f0e8; border-radius: 20px; padding: 5px 12px; color: #1a2e1a; background: white; cursor: pointer;">
            <option value="best">Best</option>
            <option value="new">Newest</option>
            <option value="old">Oldest</option>
          </select>
        </div>
        <div id="comments-container"></div>
      </div>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import {
      getFirestore, collection, query, orderBy, onSnapshot, doc, getDoc,
      serverTimestamp, increment, deleteDoc, setDoc, updateDoc, runTransaction, writeBatch
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const CATEGORY_LABELS = {
      housing: 'Housing Tips', events: 'Events', flatmate: 'Flatmate Search', general: 'General',
      recommendations: 'Recommendations', visa_admin: 'Visa & Admin', jobs_remote: 'Jobs & Remote Work',
      things_to_do: 'Things to Do'
    };

    const params = new URLSearchParams(location.search);
    const postId = String(params.get('postId') || '').trim();
    let city = String(params.get('city') || '').trim();
    if (!city) city = 'Athens';

    if (!postId) {
      window.location.replace('community-portal.html?city=' + encodeURIComponent(city));
      throw new Error('missing postId');
    }

    const firebaseConfig = {
      apiKey: "AIzaSyBfKo7gumTCJ1FtqnrV-uGAgoIvhZPowTI",
      authDomain: "livvo-573e1.firebaseapp.com",
      projectId: "livvo-573e1",
      storageBucket: "livvo-573e1.firebasestorage.app",
      messagingSenderId: "438563892670",
      appId: "1:438563892670:web:c038316d9d3fcbee065def"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let currentProfileData = null;
    let postData = null;
    let threadRepliesUnsubs = [];
    const authorCache = new Map();

    function stripHtml(html) {
      const d = document.createElement('div');
      d.innerHTML = html || '';
      return (d.textContent || d.innerText || '').trim().replace(/\s+/g, ' ');
    }

    function formatRelativeTime(ts) {
      if (!ts || typeof ts.toDate !== 'function') return 'just now';
      const then = ts.toDate().getTime();
      if (!then) return 'just now';
      const diffSec = Math.max(1, Math.floor((Date.now() - then) / 1000));
      if (diffSec < 60) return diffSec + 's ago';
      const diffMin = Math.floor(diffSec / 60);
      if (diffMin < 60) return diffMin + 'm ago';
      const diffHr = Math.floor(diffMin / 60);
      if (diffHr < 24) return diffHr + 'h ago';
      return Math.floor(diffHr / 24) + 'd ago';
    }

    function getMillis(ts) {
      if (!ts) return 0;
      if (typeof ts.toMillis === 'function') return ts.toMillis();
      const d = ts.seconds ? new Date(ts.seconds * 1000) : new Date(ts);
      return d.getTime() || 0;
    }

    async function getAuthorProfile(authorUid, fallbackUsername, fallbackPhoto) {
      if (!authorUid) {
        return {
          username: fallbackUsername || 'Anonymous',
          photoUrl: fallbackPhoto || '',
          initial: String((fallbackUsername || 'A').charAt(0)).toUpperCase()
        };
      }
      if (authorCache.has(authorUid)) return authorCache.get(authorUid);
      let profile = {
        username: fallbackUsername || 'Anonymous',
        photoUrl: fallbackPhoto || '',
        initial: String((fallbackUsername || 'A').charAt(0)).toUpperCase()
      };
      try {
        const uSnap = await getDoc(doc(db, 'users', authorUid));
        if (uSnap.exists()) {
          const ud = uSnap.data() || {};
          const un = String(ud.username || ud.displayName || fallbackUsername || 'Anonymous').trim();
          const ph = String(ud.photoURL || '').trim() || String(fallbackPhoto || '').trim();
          profile = { username: un || 'Anonymous', photoUrl: ph, initial: String((un || 'A').charAt(0)).toUpperCase() };
        }
      } catch (e) {}
      authorCache.set(authorUid, profile);
      return profile;
    }

    function escapeHtml(s) {
      return String(s || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function linkify(text) {
      const safe = escapeHtml(text);
      return safe.replace(/(https?:\/\/[^\s<]+)/g, function (url) {
        return '<a href="' + url.replace(/"/g, '&quot;') + '" target="_blank" rel="noopener noreferrer" style="color:#2d6a2d;text-decoration:underline;">' + url + '</a>';
      });
    }

    async function toggleLike(postIdInner, btn) {
      const user = auth.currentUser;
      if (!user) return;
      const countEl = document.getElementById('post-like-count');
      if (!countEl) return;
      const alreadyLiked = btn.classList.contains('liked');
      const currentCount = parseInt(countEl.textContent, 10) || 0;
      if (alreadyLiked) {
        btn.classList.remove('liked');
        countEl.textContent = String(Math.max(0, currentCount - 1));
      } else {
        btn.classList.add('liked');
        countEl.textContent = String(currentCount + 1);
      }
      try {
        const likeRef = doc(db, 'communityPosts', postIdInner, 'upvotes', user.uid);
        if (alreadyLiked) {
          await deleteDoc(likeRef);
          await updateDoc(doc(db, 'communityPosts', postIdInner), { upvoteCount: increment(-1) });
        } else {
          await setDoc(likeRef, { uid: user.uid });
          await updateDoc(doc(db, 'communityPosts', postIdInner), { upvoteCount: increment(1) });
        }
      } catch (err) {
        console.error(err);
        if (alreadyLiked) {
          btn.classList.add('liked');
          countEl.textContent = String(currentCount);
        } else {
          btn.classList.remove('liked');
          countEl.textContent = String(currentCount);
        }
      }
    }

    function makePendingCommentDoc(text, authorUsername, authorUid, authorPhoto) {
      var id = 'pending-' + Date.now() + '-' + Math.random().toString(36).slice(2, 9);
      return {
        id: id,
        data: function () {
          return {
            text: text,
            authorUsername: authorUsername,
            authorUid: authorUid,
            authorPhoto: authorPhoto,
            authorPhotoURL: authorPhoto,
            createdAt: { toDate: function () { return new Date(); } },
            likes: 0,
            likeCount: 0
          };
        }
      };
    }

    const loadingEl = document.getElementById('loading');
    const errEl = document.getElementById('err-msg');
    const shell = document.getElementById('post-shell');
    const postTitleEl = document.getElementById('post-title');
    const postCategoryTagEl = document.getElementById('post-category-tag');
    const postAuthorNameEl = document.getElementById('post-author-name');
    const postTimestampEl = document.getElementById('post-timestamp');
    const postAuthorAvatarEl = document.getElementById('post-author-avatar');
    const postBodyEl = document.getElementById('post-body');
    const postLikeBtn = document.getElementById('post-like-btn');
    const sortSelect = document.getElementById('sort-comments');
    const listEl = document.getElementById('comments-container');
    const commentInputEl = document.getElementById('comment-input');

    let latestComments = [];
    let activeReplyBox = null;

    function bumpThreadCommentCount(delta) {
      const el = document.getElementById('post-comment-count');
      if (!el) return;
      const n = Math.max(0, (parseInt(el.textContent, 10) || 0) + delta);
      el.textContent = String(n);
    }

    const heartStrokeSvg = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';

    function setCommentLikeButtonUi(btn, count, liked) {
      btn.innerHTML = heartStrokeSvg + '<span class="c-like-n">' + String(count) + '</span>';
      btn.style.color = liked ? 'var(--btn-green)' : '';
    }

    function closeAllCommentMenus() {
      listEl.querySelectorAll('.comment-more-menu').forEach(function (m) { m.hidden = true; });
    }

    listEl.addEventListener('click', closeAllCommentMenus);

    function renderComments() {
      closeAllCommentMenus();
      listEl.innerHTML = '';
      threadRepliesUnsubs.forEach(function (u) { try { u(); } catch (e) {} });
      threadRepliesUnsubs = [];

      let docs = latestComments.slice();
      if (sortSelect.value === 'best') {
        docs.sort(function (a, b) {
          const ad = a.data() || {}, bd = b.data() || {};
          return Number(bd.likes || bd.likeCount || 0) - Number(ad.likes || ad.likeCount || 0)
            || getMillis(bd.createdAt) - getMillis(ad.createdAt);
        });
      } else if (sortSelect.value === 'new') {
        docs.sort(function (a, b) { return getMillis((b.data() || {}).createdAt) - getMillis((a.data() || {}).createdAt); });
      } else {
        docs.sort(function (a, b) { return getMillis((a.data() || {}).createdAt) - getMillis((b.data() || {}).createdAt); });
      }

      if (!docs.length) {
        listEl.innerHTML = '<p class="meta-pill">No comments yet.</p>';
        return;
      }

      docs.forEach(function (cd) {
        const c = cd.data() || {};
        const username = String(c.authorUsername || 'Member').trim() || 'Member';
        const photo = String(c.authorPhotoURL || c.authorPhoto || '').trim();
        const item = document.createElement('div');
        item.className = 'comment-item';
        item.style.cssText = 'display:flex;gap:12px;margin-bottom:20px;align-items:flex-start;';

        const av = document.createElement('div');
        av.style.cssText = 'flex-shrink:0;width:32px;height:32px;border-radius:50%;overflow:hidden;background:#059669;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;';
        if (photo) {
          const img = document.createElement('img');
          img.src = photo;
          img.alt = username;
          img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
          av.appendChild(img);
        } else av.textContent = username.charAt(0).toUpperCase();

        const right = document.createElement('div');
        right.style.flex = '1';
        const meta = document.createElement('div');
        meta.style.cssText = 'display:flex;align-items:center;gap:6px;margin-bottom:4px;';
        const nameSpan = document.createElement('span');
        nameSpan.style.cssText = 'font-size:13px;font-weight:600;color:#1a2e1a;';
        nameSpan.textContent = username;
        const timeSpan = document.createElement('span');
        timeSpan.style.cssText = 'font-size:11px;color:#9ab09a;';
        timeSpan.textContent = '· ' + formatRelativeTime(c.createdAt);
        meta.appendChild(nameSpan);
        meta.appendChild(timeSpan);
        const textEl = document.createElement('p');
        textEl.style.cssText = 'font-size:14px;color:#3d5a3d;margin:0 0 8px 0;line-height:1.6;';
        textEl.innerHTML = linkify(c.text || '');

        const actionRow = document.createElement('div');
        actionRow.style.cssText = 'display:flex;align-items:center;gap:12px;';
        const likeBtn = document.createElement('button');
        likeBtn.type = 'button';
        likeBtn.style.cssText = 'border:none;background:none;font-size:12px;color:#9ab09a;cursor:pointer;padding:0;display:flex;align-items:center;gap:4px;';
        const initialCommentLikes = Number(c.likes || c.likeCount || 0);
        setCommentLikeButtonUi(likeBtn, initialCommentLikes, false);
        const replyBtn = document.createElement('button');
        replyBtn.type = 'button';
        replyBtn.style.cssText = 'border:none;background:none;font-size:12px;color:#9ab09a;cursor:pointer;padding:0;';
        replyBtn.textContent = 'Reply';

        const moreWrap = document.createElement('span');
        moreWrap.className = 'comment-more-wrap';
        const moreMenu = document.createElement('div');
        moreMenu.className = 'comment-more-menu';
        moreMenu.hidden = true;
        moreMenu.addEventListener('click', function (e) { e.stopPropagation(); });
        const moreBtn = document.createElement('button');
        moreBtn.type = 'button';
        moreBtn.style.cssText = 'border:none;background:none;font-size:12px;color:#9ab09a;cursor:pointer;padding:0;';
        moreBtn.textContent = '···';
        moreBtn.addEventListener('click', function (e) {
          e.stopPropagation();
          moreMenu.hidden = !moreMenu.hidden;
        });
        if (currentUser && c.authorUid && c.authorUid === currentUser.uid) {
          const delOpt = document.createElement('button');
          delOpt.type = 'button';
          delOpt.textContent = 'Delete';
          delOpt.addEventListener('click', async function (e) {
            e.stopPropagation();
            moreMenu.hidden = true;
            try {
              await deleteDoc(doc(db, 'communityPosts', postId, 'comments', cd.id));
              await runTransaction(db, async function (transaction) {
                const postSnap = await transaction.get(doc(db, 'communityPosts', postId));
                if (!postSnap.exists()) return;
                const cur = Number((postSnap.data() || {}).commentCount || 0);
                transaction.update(doc(db, 'communityPosts', postId), { commentCount: Math.max(0, cur - 1) });
              });
              bumpThreadCommentCount(-1);
            } catch (err) {
              console.error('Delete comment failed:', err);
            }
          });
          moreMenu.appendChild(delOpt);
        }
        moreWrap.appendChild(moreBtn);
        moreWrap.appendChild(moreMenu);

        actionRow.appendChild(likeBtn);
        actionRow.appendChild(replyBtn);
        if (moreMenu.firstChild) actionRow.appendChild(moreWrap);

        if (currentUser) {
          getDoc(doc(db, 'communityPosts', postId, 'comments', cd.id, 'likes', currentUser.uid)).then(function (ls) {
            if (ls.exists()) setCommentLikeButtonUi(likeBtn, initialCommentLikes, true);
          }).catch(function () {});
        }
        likeBtn.addEventListener('click', async function (e) {
          e.stopPropagation();
          if (!currentUser) return;
          const ref = doc(db, 'communityPosts', postId, 'comments', cd.id, 'likes', currentUser.uid);
          const cLikeSnap = await getDoc(ref);
          const wasLiked = cLikeSnap.exists();
          try {
            if (wasLiked) {
              await deleteDoc(ref);
              await updateDoc(doc(db, 'communityPosts', postId, 'comments', cd.id), { likes: increment(-1) });
            } else {
              await setDoc(ref, { uid: currentUser.uid, createdAt: serverTimestamp() });
              await updateDoc(doc(db, 'communityPosts', postId, 'comments', cd.id), { likes: increment(1) });
            }
            const latest = await getDoc(doc(db, 'communityPosts', postId, 'comments', cd.id));
            const safeLikes = Math.max(0, Number(latest.exists() ? (latest.data() || {}).likes || 0 : 0));
            setCommentLikeButtonUi(likeBtn, safeLikes, !wasLiked);
          } catch (err) {
            console.error('Comment like failed:', err);
          }
        });

        const repliesWrap = document.createElement('div');
        repliesWrap.className = 'nested-reply';

        const inlineReplyWrap = document.createElement('div');
        inlineReplyWrap.className = 'nested-reply thread-composer-panel';
        inlineReplyWrap.hidden = true;
        const inlineReplyInput = document.createElement('textarea');
        inlineReplyInput.className = 'thread-composer-text';
        inlineReplyInput.placeholder = 'Reply to u/' + username;
        const inlineActions = document.createElement('div');
        inlineActions.className = 'reply-actions-row';
        const inlineReplyCancel = document.createElement('button');
        inlineReplyCancel.type = 'button';
        inlineReplyCancel.className = 'reply-cancel-link';
        inlineReplyCancel.textContent = 'Cancel';
        const inlineReplySubmit = document.createElement('button');
        inlineReplySubmit.type = 'button';
        inlineReplySubmit.className = 'btn-primary';
        inlineReplySubmit.textContent = 'Reply';
        inlineActions.appendChild(inlineReplyCancel);
        inlineActions.appendChild(inlineReplySubmit);
        inlineReplyWrap.appendChild(inlineReplyInput);
        inlineReplyWrap.appendChild(inlineActions);

        const replyQ = query(collection(db, 'communityPosts', postId, 'comments', cd.id, 'replies'), orderBy('createdAt', 'asc'));
        const unsubReplies = onSnapshot(replyQ, function (rsnap) {
          repliesWrap.innerHTML = '';
          rsnap.docs.forEach(function (rd) {
            const r = rd.data() || {};
            const rName = String(r.authorUsername || 'Member').trim() || 'Member';
            const row = document.createElement('div');
            row.className = 'comment-item';
            row.style.marginTop = '6px';
            const rav = document.createElement('div');
            rav.className = 'post-author-av';
            rav.style.width = '26px';
            rav.style.height = '26px';
            rav.style.fontSize = '11px';
            if (r.authorPhotoURL || r.authorPhoto) {
              const ri = document.createElement('img');
              ri.src = r.authorPhotoURL || r.authorPhoto;
              ri.alt = rName;
              rav.appendChild(ri);
            } else rav.textContent = rName.charAt(0).toUpperCase();
            const rr = document.createElement('div');
            rr.style.flex = '1';
            const rm = document.createElement('div');
            rm.className = 'comment-meta';
            rm.textContent = rName + ' · ' + formatRelativeTime(r.createdAt);
            const rb = document.createElement('div');
            rb.className = 'comment-body';
            rb.innerHTML = linkify(r.text || '');
            rr.appendChild(rm);
            rr.appendChild(rb);
            row.appendChild(rav);
            row.appendChild(rr);
            repliesWrap.appendChild(row);
          });
        });
        threadRepliesUnsubs.push(unsubReplies);

        replyBtn.addEventListener('click', function (e) {
          e.stopPropagation();
          if (activeReplyBox && activeReplyBox !== inlineReplyWrap) activeReplyBox.hidden = true;
          if (activeReplyBox && activeReplyBox.parentNode) activeReplyBox.parentNode.classList.remove('comment-highlight');
          activeReplyBox = inlineReplyWrap;
          item.classList.add('comment-highlight');
          inlineReplyWrap.hidden = false;
          inlineReplyInput.focus();
        });
        inlineReplyCancel.addEventListener('click', function () {
          inlineReplyInput.value = '';
          inlineReplyWrap.hidden = true;
          item.classList.remove('comment-highlight');
        });
        inlineReplySubmit.addEventListener('click', async function () {
          if (!currentUser) return;
          const replyText = (inlineReplyInput.value || '').trim();
          if (!replyText) return;
          const authorUsername = (currentProfileData && String(currentProfileData.username || '').trim())
            || currentUser.displayName || (currentUser.email ? currentUser.email.split('@')[0] : '') || 'Member';
          const authorPhoto = (currentProfileData && String(currentProfileData.photoURL || '').trim()) || currentUser.photoURL || '';
          try {
            const replyCol = collection(db, 'communityPosts', postId, 'comments', cd.id, 'replies');
            await setDoc(doc(replyCol), {
              text: replyText,
              authorUid: currentUser.uid,
              authorUsername: authorUsername,
              authorPhotoURL: authorPhoto || null,
              authorPhoto: authorPhoto,
              createdAt: serverTimestamp()
            });
            await updateDoc(doc(db, 'communityPosts', postId), { commentCount: increment(1) });
            bumpThreadCommentCount(1);
            inlineReplyInput.value = '';
            inlineReplyWrap.hidden = true;
            item.classList.remove('comment-highlight');
          } catch (err) {
            console.error('Reply failed:', err);
          }
        });

        right.appendChild(meta);
        right.appendChild(textEl);
        right.appendChild(actionRow);
        right.appendChild(inlineReplyWrap);
        right.appendChild(repliesWrap);
        item.appendChild(av);
        item.appendChild(right);
        listEl.appendChild(item);
      });
    }

    async function submitThreadComment() {
      if (!currentUser) return;
      const text = (commentInputEl.value || '').trim();
      if (!text) return;
      const authorUsername = (currentProfileData && String(currentProfileData.username || '').trim())
        || currentUser.displayName || (currentUser.email ? currentUser.email.split('@')[0] : '') || 'Member';
      const authorPhoto = (currentProfileData && String(currentProfileData.photoURL || '').trim()) || currentUser.photoURL || '';
      const pendingDoc = makePendingCommentDoc(text, authorUsername, currentUser.uid, authorPhoto);
      latestComments = latestComments.concat([pendingDoc]);
      renderComments();
      const batch = writeBatch(db);
      const postRef = doc(db, 'communityPosts', postId);
      const commentRef = doc(collection(db, 'communityPosts', postId, 'comments'));
      batch.set(commentRef, {
        text, authorUid: currentUser.uid, authorUsername,
        authorPhotoURL: authorPhoto || null,
        authorPhoto: authorPhoto,
        likes: 0, createdAt: serverTimestamp()
      });
      batch.update(postRef, { commentCount: increment(1) });
      try {
        await batch.commit();
        bumpThreadCommentCount(1);
        commentInputEl.value = '';
        commentInputEl.style.height = '';
      } catch (err) {
        console.error('Comment failed:', err);
        var pid = pendingDoc.id;
        latestComments = latestComments.filter(function (d) { return d.id !== pid; });
        renderComments();
      }
    }

    window.submitComment = function () { submitThreadComment(); };
    window.cancelComment = function () {
      commentInputEl.value = '';
      commentInputEl.style.height = '';
    };
    window.likePost = function () { toggleLike(postId, postLikeBtn); };

    async function hydratePost(data) {
      postData = data;
      const authorUid = data.author || data.authorId || '';
      const fallback = data.authorUsername || data.authorName || 'Anonymous';
      const ap = await getAuthorProfile(authorUid, fallback, data.authorPhotoURL || data.authorPhoto || '');

      postTitleEl.textContent = data.title || 'Untitled';
      const catKey = data.category || '';
      postCategoryTagEl.textContent = CATEGORY_LABELS[catKey] || catKey || '';
      postAuthorNameEl.textContent = ap.username || 'Member';
      postTimestampEl.textContent = data.createdAt ? '· ' + formatRelativeTime(data.createdAt) : '';

      postAuthorAvatarEl.innerHTML = '';
      if (ap.photoUrl) {
        const im = document.createElement('img');
        im.src = ap.photoUrl;
        im.alt = ap.username;
        postAuthorAvatarEl.appendChild(im);
      } else postAuthorAvatarEl.textContent = ap.initial;

      const bodyPlain = (data.body != null && String(data.body).trim()) ? String(data.body) : stripHtml(data.bodyHtml || '');
      postBodyEl.textContent = bodyPlain || '';

      document.getElementById('post-like-count').textContent = String(Number(data.upvoteCount || 0));
      document.getElementById('post-comment-count').textContent = String(Number(data.commentCount || 0));

      let hasLiked = false;
      if (currentUser) {
        try {
          const vs = await getDoc(doc(db, 'communityPosts', postId, 'upvotes', currentUser.uid));
          hasLiked = vs.exists();
        } catch (e) {}
      }
      if (hasLiked) postLikeBtn.classList.add('liked');
      else postLikeBtn.classList.remove('liked');
    }

    let commentsUnsub = null;

    function wireCommentsListener() {
      if (commentsUnsub) {
        commentsUnsub();
        commentsUnsub = null;
      }
      const cq = query(collection(db, 'communityPosts', postId, 'comments'), orderBy('createdAt', 'asc'));
      commentsUnsub = onSnapshot(cq, function (csnap) {
        latestComments = csnap.docs.slice();
        renderComments();
      }, function () {
        listEl.innerHTML = '<p class="meta-pill">Could not load comments.</p>';
      });
    }

    sortSelect.addEventListener('change', function () { renderComments(); });

    let postUnsub = null;
    let postHydrated = false;

    function startPostListener() {
      if (postUnsub) { postUnsub(); postUnsub = null; }
      const pref = doc(db, 'communityPosts', postId);
      postUnsub = onSnapshot(pref, async function (snap) {
        if (!snap.exists()) {
          loadingEl.hidden = true;
          shell.hidden = true;
          errEl.hidden = false;
          errEl.textContent = 'This post could not be found.';
          return;
        }
        const pdata = snap.data() || {};
        loadingEl.hidden = true;
        errEl.hidden = true;
        shell.hidden = false;
        document.title = (pdata.title || 'Post') + ' | Livvo';
        if (!postHydrated) {
          await hydratePost(pdata);
          postHydrated = true;
          wireCommentsListener();
        } else {
          const cc = document.getElementById('post-comment-count');
          if (cc) cc.textContent = String(Number(pdata.commentCount || 0));
          const lc = document.getElementById('post-like-count');
          if (lc) lc.textContent = String(Number(pdata.upvoteCount || 0));
        }
      }, function () {
        loadingEl.hidden = true;
        errEl.hidden = false;
        errEl.textContent = 'Could not load this post.';
      });
    }

    let authTimer = null;
    function scheduleRedirect() {
      if (authTimer) clearTimeout(authTimer);
      authTimer = setTimeout(function () {
        if (!auth.currentUser) {
          const ret = 'community-post.html?postId=' + encodeURIComponent(postId) + '&city=' + encodeURIComponent(city);
          window.location.href = 'signup.html?redirect=community&city=' + encodeURIComponent(city) + '&return=' + encodeURIComponent(ret);
        }
      }, 2000);
    }

    onAuthStateChanged(auth, async function (user) {
      if (!user) {
        scheduleRedirect();
        return;
      }
      if (authTimer) { clearTimeout(authTimer); authTimer = null; }
      currentUser = user;
      try {
        const pd = await getDoc(doc(db, 'users', user.uid));
        currentProfileData = pd.exists() ? pd.data() : null;
      } catch (e) {
        currentProfileData = null;
      }
      startPostListener();
    });
  </script>
</body>
</html>
