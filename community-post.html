<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post | Livvo</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23059669'/><path d='M8 12l8 12 8-12-4-6H12z' stroke='white' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #059669;
      --btn-green: #1a7a4a;
      --btn-green-hover: #156b42;
      --bg: #edf7f0;
      --surface: #ffffff;
      --border: #d4e5dc;
      --text: #1a2e24;
      --muted: #4a7c5e;
    }
    body { background: var(--bg); color: var(--text); font-family: "DM Sans", sans-serif; min-height: 100vh; }
    .thread-page.thread-page-wrapper {
      max-width: 1180px;
      margin: 0 auto;
      padding: 16px 16px 60px;
      box-sizing: border-box;
    }
    .thread-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--btn-green);
      font-weight: 700;
      font-size: 0.95rem;
      text-decoration: none;
      margin-bottom: 20px;
    }
    .thread-back:hover { text-decoration: underline; }
    .post-card {
      background: var(--surface);
      border: 1px solid #d4eadb;
      border-radius: 16px;
      padding: 22px;
      margin-bottom: 20px;
    }
    .post-card h1 {
      font-family: "Sora", sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 10px;
    }
    .post-cat {
      display: inline-flex;
      align-items: center;
      font-size: 12px;
      padding: 2px 10px;
      border-radius: 999px;
      background: #f2f6f4;
      border: 1px solid #e1ebe5;
      color: #666;
      margin-bottom: 14px;
    }
    .post-author {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .post-author-av {
      width: 40px; height: 40px; border-radius: 50%; overflow: hidden;
      background: #059669; color: #fff; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; flex-shrink: 0;
    }
    .post-author-av img { width: 100%; height: 100%; object-fit: cover; }
    .post-author-meta { font-size: 0.88rem; color: #666; }
    .post-body-text { font-size: 1rem; line-height: 1.6; color: var(--text); white-space: pre-wrap; }
    .thread-top-pills {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      margin: 18px 0 0;
    }
    .thread-pill {
      border: 1px solid #d6e8dc; background: #f6fbf8; color: #2f4f3d;
      border-radius: 999px; padding: 8px 12px; font-size: 13px; font-weight: 700;
      display: inline-flex; align-items: center; gap: 4px; cursor: pointer; font: inherit;
    }
    .thread-join-trigger {
      width: 100%; border: 1px solid #cfe4d7; border-radius: 999px; background: #fff;
      color: #5d7467; padding: 11px 14px; text-align: left; font: inherit; cursor: text;
      margin-top: 16px;
    }
    .thread-composer-panel {
      margin-top: 8px; border: 1px solid #d7e9dd; border-radius: 10px; background: #fff; padding: 10px;
    }
    .thread-composer-text {
      width: 100%; min-height: 90px; padding: 12px; border: 1px solid #c5e0d0; border-radius: 8px;
      resize: vertical; font: inherit;
    }
    .thread-composer-text:focus {
      outline: none; border-color: var(--btn-green);
      box-shadow: 0 0 0 3px rgba(26, 122, 74, 0.12);
    }
    .thread-composer-toolbar {
      margin-top: 8px; display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .thread-toolbar-left { display: inline-flex; align-items: center; gap: 6px; }
    .thread-toolbar-btn {
      border: 1px solid #d7e9dd; background: #fff; color: #335443;
      border-radius: 8px; padding: 4px 8px; font-size: 12px; font-weight: 700; cursor: pointer;
    }
    .thread-toolbar-actions { display: inline-flex; align-items: center; gap: 8px; }
    .btn-primary {
      font-family: inherit; font-size: 0.9rem; font-weight: 600; padding: 10px 18px;
      border-radius: 10px; border: none; background: var(--btn-green); color: #fff; cursor: pointer;
    }
    .btn-primary:hover { background: var(--btn-green-hover); }
    .btn-secondary {
      font-family: inherit; font-size: 0.9rem; font-weight: 600; padding: 10px 18px;
      border-radius: 10px; border: 1px solid var(--border); background: #fff; color: var(--text); cursor: pointer;
    }
    .sort-row { margin: 20px 0 12px; }
    .sort-row select {
      border: 1px solid #d7e9dd; border-radius: 8px; padding: 8px 12px; font: inherit; font-size: 14px;
    }
    .comment-item {
      display: flex; gap: 10px; align-items: flex-start; margin-bottom: 12px;
      border-radius: 10px; padding: 8px;
    }
    .comment-highlight { background: #fff9e8; }
    .comment-meta { font-size: 0.86rem; color: #666; margin-bottom: 4px; }
    .comment-body { font-size: 0.95rem; line-height: 1.5; }
    .comment-actions-row { margin-top: 6px; display: flex; align-items: center; gap: 10px; color: #627a6d; font-size: 12px; }
    .comment-action-link {
      border: none; background: transparent; color: #627a6d; font-size: 12px; font-weight: 700;
      cursor: pointer; padding: 0;
    }
    .comment-action-link:hover { color: var(--btn-green); }
    .nested-reply {
      margin-left: 36px; margin-top: 8px; border-left: 2px solid #dcebe2; padding-left: 10px;
    }
    .reply-actions-row { display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; }
    .reply-cancel-link {
      border: none; background: transparent; color: #60776a; font-size: 13px; font-weight: 600;
      cursor: pointer; padding: 8px 4px;
    }
    .comment-more-wrap { position: relative; display: inline-flex; }
    .comment-more-menu {
      position: absolute; right: 0; top: calc(100% + 4px); min-width: 120px;
      background: #fff; border: 1px solid var(--border); border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08); padding: 6px; z-index: 50;
    }
    .comment-more-menu[hidden] { display: none !important; }
    .comment-more-menu button {
      display: block; width: 100%; text-align: left; padding: 8px 10px; border: none; border-radius: 6px;
      background: transparent; font: inherit; font-size: 13px; font-weight: 600; color: #b42318; cursor: pointer;
    }
    .comment-more-menu button:hover { background: #fef2f2; }
    .feed-empty, .meta-pill { text-align: center; color: var(--muted); padding: 24px; }
    .meta-pill { text-align: left; padding: 0; font-size: 0.88rem; }
    #post-like-btn { transition: all 0.15s ease; }
    #post-like-btn.liked svg path { fill: #e53e3e; stroke: #e53e3e; }
    #post-like-btn.liked { color: #e53e3e !important; background: #fff0f0 !important; }
    [id^="clb-"] { transition: all 0.15s ease; }
    [id^="clb-"].liked { color: #e53e3e !important; }
    [id^="clb-"].liked svg path { fill: #e53e3e; stroke: #e53e3e; }
    #post-avatar { flex-shrink: 0; width: 40px; height: 40px; border-radius: 50%; overflow: hidden; background: #059669; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; }
    #post-avatar img { width: 100%; height: 100%; object-fit: cover; }
    #composer-avatar-small { width: 36px; height: 36px; border-radius: 50%; overflow: hidden; background: #2d6a2d; color: #fff; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    #composer-avatar-small img { width: 100%; height: 100%; object-fit: cover; }

    .comment-wrapper {
      position: relative;
      padding-bottom: 4px;
    }

    .comment-wrapper + .comment-wrapper::before {
      content: '';
      display: block;
      height: 1px;
      background: #f0f5f0;
      margin: 0 0 16px 0;
    }

    .replies-container {
      position: relative;
      margin-top: 10px;
      margin-left: 16px;
      padding-left: 14px;
      border-left: 2px solid #e8f0e8;
    }

    .comment-wrapper > .comment {
      transition: background 0.2s ease;
      border-radius: 8px;
      padding: 6px 8px;
      margin: -6px -8px 14px -8px;
    }

    .comment-wrapper > .comment:hover {
      background: #f0fdf4;
    }

    .reply-item {
      position: relative;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 12px;
      padding: 6px 8px;
      margin-left: -8px;
      margin-right: -8px;
      border-radius: 8px;
      transition: background 0.2s ease;
    }

    .reply-item:last-child {
      margin-bottom: 0;
    }

    .reply-item:hover {
      background: #f0fdf4;
    }

    @keyframes commentsThreadFadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #comments-container.comments-fade-in {
      animation: commentsThreadFadeIn 0.4s ease-out forwards;
    }

    #post-image-wrap {
      margin: 12px 0;
      overflow: hidden;
      border-radius: 12px;
    }

    #post-image {
      width: 100%;
      max-height: 320px;
      object-fit: cover;
      border-radius: 12px;
      display: block;
      vertical-align: middle;
    }

    .thread-main-grid {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0;
      display: grid;
      grid-template-columns: minmax(0, 740px) minmax(240px, 280px);
      gap: 24px;
      align-items: start;
      justify-content: center;
      box-sizing: border-box;
    }
    .thread-main-col {
      width: 100%;
      max-width: 740px;
    }
    .more-col {
      max-width: 280px;
    }
    .thread-related-aside {
      position: sticky;
      top: 72px;
      background: #fff;
      border: 1px solid #e8f0e8;
      border-radius: 16px;
      padding: 16px;
    }
    .thread-related-aside h3 {
      font-family: "Sora", sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      color: #064e3b;
      margin: 0 0 12px 0;
    }
    .related-card {
      display: block;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #f0f5f0;
      margin-bottom: 8px;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s, border-color 0.15s;
    }
    .related-card:hover {
      background: #ecfdf5;
      border-color: #d1fae5;
    }
    .related-card-title {
      font-size: 13px;
      font-weight: 600;
      color: #064e3b;
      line-height: 1.35;
      margin: 0 0 4px 0;
    }
    .related-card-meta {
      font-size: 11px;
      color: #9ab09a;
    }
    .comment-compact-zone {
      cursor: pointer;
      border-radius: 8px;
      margin: 0 -6px;
      padding: 4px 6px;
      transition: background 0.15s ease;
    }
    .comment-compact-zone:hover { background: rgba(240, 253, 244, 0.55); }
    .comment-compact-zone:focus-visible {
      outline: 2px solid #059669;
      outline-offset: 2px;
    }
    .comment-text-compact {
      font-size: 14px;
      color: #2d4a2d;
      line-height: 1.6;
      margin: 0 0 6px 0;
      word-break: break-word;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      max-height: 1.6em;
      transition: max-height 0.35s ease;
    }
    .comment-text-compact.comment-text-expanded {
      white-space: normal;
      text-overflow: clip;
      max-height: 2000px;
      overflow: visible;
    }
    .pinned-answer-block {
      background: #ecfdf5;
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 12px;
      border: 1px solid #d1fae5;
    }
    .thread-post-edit-actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      flex-wrap: nowrap;
      gap: 10px;
      margin: 0 0 16px 0;
      width: 100%;
      box-sizing: border-box;
    }
    .pinned-answer-label {
      font-size: 11px;
      font-weight: 700;
      color: #047857;
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 5000;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 16px;
      background: rgba(26, 46, 36, 0.45);
      backdrop-filter: blur(4px);
    }
    .modal-overlay[hidden] { display: none !important; }
    .modal-panel-thread {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 16px;
      border: 1px solid #d4eadb;
      padding: 20px;
      max-height: 85vh;
      overflow-y: auto;
      margin-top: auto;
      margin-bottom: auto;
    }
    .modal-panel-thread h2 {
      font-family: "Sora", sans-serif;
      font-size: 1.1rem;
      color: #064e3b;
      margin: 0 0 12px 0;
    }
    .user-search-result {
      width: 100%;
      text-align: left;
      border:1px solid #f0f5f0;
      background: #fff;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 6px;
      cursor: pointer;
      font: inherit;
      font-size: 14px;
      color: #064e3b;
    }
    .user-search-result:hover { background: #ecfdf5; }

    @media (max-width: 900px) {
      .thread-main-grid {
        grid-template-columns: 1fr;
        padding: 0;
      }
      .thread-main-col {
        justify-self: center;
      }
      .more-col,
      .thread-related-aside {
        display: none;
      }
    }

    @media (max-width: 768px) {
      .post-area, #post-container {
        border-radius: 12px !important;
        padding: 16px !important;
      }

      h1#post-title {
        font-size: 18px !important;
      }

      .comment {
        gap: 8px !important;
      }

      .comment-avatar {
        width: 28px !important;
        height: 28px !important;
      }

      #back-btn {
        padding: 8px 0 !important;
        font-size: 14px !important;
      }
    }
  </style>
</head>
<body>

    <a id="thread-nav-logo" href="index.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="28" height="28" rx="7" fill="#059669"/>
        <polyline points="6,10 14,21 22,10" fill="none" stroke="white" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="10,15 14,20 18,15" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>
      </svg>
      <span style="font-family:'Sora',sans-serif;font-weight:800;font-size:18px;color:#1a2e1a;letter-spacing:-0.04em;">livvo</span>

    <div style="display:flex;align-items:center;gap:16px;">

      <a id="thread-nav-community" href="community-portal.html" style="font-size:13px;color:#5a7a5a;text-decoration:none;font-weight:500;">Community</a>
      <div id="thread-nav-avatar" style="width:32px;height:32px;border-radius:50%;overflow:hidden;background:#2d6a2d;display:flex;align-items:center;justify-content:center;color:white;font-size:13px;font-weight:700;cursor:pointer;"></div>
    </div>
  </nav>
  <main class="thread-page thread-page-wrapper">
    <div id="loading" class="meta-pill" style="max-width: 740px; margin: 0 auto; padding: 0 16px;">Loading…</div>
    <p id="err-msg" class="feed-empty" style="max-width: 740px; margin: 0 auto; padding: 0 16px;" hidden></p>
    <div id="post-shell" hidden>
      <div class="thread-main-grid">
      <div class="thread-main-col" style="min-width:0;">
        <a id="back-btn" href="community-portal.html" style="display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:#2d6a2d;text-decoration:none;margin-bottom:20px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
          Back
        </a>
        <div id="post-container" class="post-area" style="background: white; border: 1px solid #e8f0e8; border-radius: 16px; padding: 24px; margin-bottom: 12px;">
          <div style="display: flex; align-items: flex-start; gap: 10px; margin-bottom: 16px;">
            <div id="post-avatar"></div>
            <div style="flex:1;min-width:0;">
              <div>
                <span style="font-size: 13px; font-weight: 700; color: #1a2e1a;" id="post-author"></span>
                <span style="font-size: 12px; color: #9ab09a; margin-left: 6px;" id="post-time"></span>
              </div>
              <div id="post-credential" style="font-size: 12px; color: #9ab09a; margin-top: 3px; line-height: 1.35; display: none;"></div>
            </div>
            <span id="post-category" class="post-badge" style="margin-left:auto;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;flex-shrink:0;"></span>
            <div id="post-owner-menu-wrap" hidden style="position:relative;flex-shrink:0;margin-left:8px;align-self:flex-start;"></div>
          </div>
          <h1 style="font-size: 22px; font-weight: 800; color: #1a2e1a; margin: 0 0 8px 0; line-height: 1.3;" id="post-title"></h1>
          <p style="font-size: 15px; color: #3d5a3d; line-height: 1.7; margin: 0 0 20px 0; white-space: pre-wrap;" id="post-body"></p>
          <div id="post-image-wrap" style="display: none;">
            <img id="post-image" alt="">
          </div>
          <div style="display: flex; align-items: center; gap: 8px; padding-top: 16px; border-top: 1px solid #f0f5f0; flex-wrap: wrap;">
            <button type="button" id="post-like-btn" onclick="likePost()" style="display: flex; align-items: center; gap: 5px; border: none; background: #f5f5f5; border-radius: 20px; padding: 7px 14px; cursor: pointer; font-size: 13px; color: #5a7a5a; transition: all 0.15s;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
              <span id="post-like-count">0</span>
            </button>
            <button type="button" onclick="scrollToComments()" style="font-size:13px;color:#9ab09a;display:flex;align-items:center;gap:5px;border:none;background:none;cursor:pointer;padding:0;font:inherit;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              <span id="post-comment-count">0</span> comments
            </button>
            <div style="display:flex;align-items:center;gap:8px;margin-left:auto;flex-wrap:wrap;">
            <button type="button" id="post-share-btn" onclick="sharePost()" style="display:flex;align-items:center;gap:5px;border:none;background:#f5f5f5;border-radius:20px;padding:7px 14px;cursor:pointer;font-size:13px;color:#5a7a5a;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
              Share
            </button>
            <button type="button" id="request-answer-btn" hidden style="display:flex;align-items:center;gap:5px;border:none;background:#ecfdf5;border-radius:20px;padding:7px 14px;cursor:pointer;font-size:13px;font-weight:600;color:#059669;border:1px solid #d1fae5;">
              Request an answer
            </button>
            </div>
          </div>
        </div>
        <div id="composer-collapsed" style="background: white; border: 1px solid #e8f0e8; border-radius: 12px; padding: 12px 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; cursor: text;" onclick="expandComposer()">
          <div id="composer-avatar-small"></div>
          <div style="flex: 1; font-size: 14px; color: #9ab09a;">Share your thoughts...</div>

    function formatRelativeTime(ts) {
      if (!ts || typeof ts.toDate !== 'function') return 'just now';
      const then = ts.toDate().getTime();
      if (!then) return 'just now';
      const diffSec = Math.max(1, Math.floor((Date.now() - then) / 1000));
      if (diffSec < 60) return diffSec + 's ago';
      const diffMin = Math.floor(diffSec / 60);
      if (diffMin < 60) return diffMin + 'm ago';
      const diffHr = Math.floor(diffMin / 60);
      if (diffHr < 24) return diffHr + 'h ago';
      return Math.floor(diffHr / 24) + 'd ago';
    }

    /** Optimistic UI + atomic Firestore toggle (upvotes subcollection + upvoteCount). */
    async function likePostImpl() {
      if (!currentUser) return;
      const btn = document.getElementById('post-like-btn');
      const countEl = document.getElementById('post-like-count');
      if (!btn || !countEl) return;
      const alreadyLiked = btn.classList.contains('liked');
      const currentCount = parseInt(countEl.textContent, 10) || 0;

      if (alreadyLiked) {
        applyPostLikeVisual(btn, false);
        countEl.textContent = String(Math.max(0, currentCount - 1));
      } else {
        applyPostLikeVisual(btn, true);
        countEl.textContent = String(currentCount + 1);
        btn.style.transform = 'scale(1.15)';
        setTimeout(function () { btn.style.transform = 'scale(1)'; }, 150);
      }

      const postRef = doc(db, 'communityPosts', postId);
      const likeRef = doc(db, 'communityPosts', postId, 'upvotes', currentUser.uid);
      try {
        await runTransaction(db, async function (transaction) {
          const likeSnap = await transaction.get(likeRef);
          const liked = likeSnap.exists;
          if (alreadyLiked) {
            if (liked) {
              transaction.delete(likeRef);
              transaction.update(postRef, { upvoteCount: increment(-1) });
            }
          } else if (!liked) {
            transaction.set(likeRef, { uid: currentUser.uid });
            transaction.update(postRef, { upvoteCount: increment(1) });
          }
        });
      } catch (err) {
        if (alreadyLiked) {
          applyPostLikeVisual(btn, true);
          countEl.textContent = String(currentCount);
        } else {
          applyPostLikeVisual(btn, false);
          countEl.textContent = String(currentCount);
        }
        console.error('Like error:', err);
      }
    }

      threadRepliesUnsubs = [];

      var pinnedId = String((postData && postData.pinnedCommentId) || '').trim();
      var pinnedDoc = null;

        if (pinnedId && cd.id === pinnedId) {

        }

    async function submitThreadComment() {
      if (!currentUser || isSubmittingComment) return;
      const text = (commentInputEl && commentInputEl.value || '').trim();
      if (!text) return;

      isSubmittingComment = true;
      const submitBtn = document.getElementById('thread-comment-submit-btn');
      var prevLabel = submitBtn ? submitBtn.textContent : '';
      if (submitBtn) {
        submitBtn.textContent = 'Posting...';
        submitBtn.disabled = true;
      }

      const authorUsername = (currentProfileData && String(currentProfileData.username || '').trim())
        || currentUser.displayName || (currentUser.email ? currentUser.email.split('@')[0] : '') || 'Member';
      const authorPhoto = (currentProfileData && String(currentProfileData.photoURL || '').trim()) || currentUser.photoURL || '';
      const batch = writeBatch(db);
      const postRef = doc(db, 'communityPosts', postId);
      const commentRef = doc(collection(db, 'communityPosts', postId, 'comments'));
      batch.set(commentRef, {
        text, authorUid: currentUser.uid, authorUsername,
        authorPhotoURL: authorPhoto || null,
        authorPhoto: authorPhoto,
        likes: 0, createdAt: serverTimestamp()
      });
      batch.update(postRef, { commentCount: increment(1) });
      try {
        await batch.commit();
        if (commentInputEl) {
          commentInputEl.value = '';
          commentInputEl.style.height = '';
        }
        collapseComposer();
      } catch (err) {
        console.error('Comment submit error:', err);
        showToast('Could not post comment');
      } finally {
        isSubmittingComment = false;
        if (submitBtn) {
          submitBtn.textContent = prevLabel || 'Comment';
          submitBtn.disabled = false;
        }
      }
    }

    (function initRequestAnswerModal() {
      var modal = document.getElementById('modal-request-answer');
      var btn = document.getElementById('request-answer-btn');
      var closeBtn = document.getElementById('request-answer-close');
      var search = document.getElementById('request-answer-search');
      var results = document.getElementById('request-answer-results');
      if (!modal || !btn) return;
      var searchTimer = null;
      function closeReqModal() {
        modal.hidden = true;
        if (search) search.value = '';
        if (results) results.innerHTML = '';
      }
      btn.addEventListener('click', function () {
        if (!currentUser) return;
        modal.hidden = false;
        if (search) search.focus();
      });
      if (closeBtn) closeBtn.addEventListener('click', closeReqModal);
      modal.addEventListener('click', function (e) {
        if (e.target === modal) closeReqModal();
      });
      if (search) {
        search.addEventListener('input', function () {
          clearTimeout(searchTimer);
          var q = (search.value || '').trim();
          if (!results) return;
          results.innerHTML = '';
          if (q.length < 2) return;
          searchTimer = setTimeout(async function () {
            try {
              var uq = query(
                collection(db, 'users'),
                where('displayName', '>=', q),
                where('displayName', '<=', q + '\uf8ff'),
                limit(12)
              );
              var us = await getDocs(uq);
              us.forEach(function (ud) {
                var uid = ud.id;
                if (currentUser && uid === currentUser.uid) return;
                var d = ud.data() || {};
                var nm = String(d.displayName || d.username || '').trim();
                if (!nm) return;
                var row = document.createElement('button');
                row.type = 'button';
                row.className = 'user-search-result';
                row.textContent = nm;
                row.addEventListener('click', async function () {
                  try {
                    await addDoc(collection(db, 'notifications'), {
                      userId: uid,
                      type: 'answer_request',
                      postId: postId,
                      postTitle: (postData && postData.title) || 'Post',
                      requestedBy: currentUser.uid,
                      city: city,
                      createdAt: serverTimestamp(),
                      read: false
                    });
                    showToast('Request sent');
                    closeReqModal();
                  } catch (e) {
                    console.error(e);
                  }
                });
                results.appendChild(row);
              });
            } catch (e) {
              console.error(e);
            }
          }, 300);
        });
      }
    })();

      const displayName = ap.username || 'Member';

      const displayInitial = ap.initial;

      postTitleEl.textContent = data.title || 'Untitled';

      postCategoryTagEl.className = 'post-badge';

      postAuthorAvatarEl.innerHTML = '';

        const im = document.createElement('img');

      const bodyPlain = (data.body != null && String(data.body).trim()) ? String(data.body) : stripHtml(data.bodyHtml || '');
      postBodyEl.textContent = bodyPlain || '';

      const postImageWrap = document.getElementById('post-image-wrap');
      const postImageEl = document.getElementById('post-image');
      if (postImageWrap && postImageEl) {

          postImageEl.style.display = 'block';
          postImageWrap.style.display = 'block';
          postImageEl.onerror = function () {
            postImageWrap.style.display = 'none';
          };
        } else {
          postImageEl.removeAttribute('src');
          postImageWrap.style.display = 'none';
        }
      }

      document.getElementById('post-like-count').textContent = String(Number(data.upvoteCount || 0));
      document.getElementById('post-comment-count').textContent = String(Number(data.commentCount || 0));

      document.title = (data.title || 'Post') + ' | Livvo';

      let hasLiked = false;
      if (currentUser) {
        try {
          const vs = await getDoc(doc(db, 'communityPosts', postId, 'upvotes', currentUser.uid));
          hasLiked = vs.exists;
        } catch (e) {}
      }
      applyPostLikeVisual(postLikeBtn, hasLiked);

      updateCommentCountLabel();
      fillComposerAvatar();

      var rab = document.getElementById('request-answer-btn');
      if (rab) {
        var showReq = String(data.type || '') === 'question' && !!currentUser;
        rab.hidden = !showReq;
        if (showReq) rab.style.display = 'flex';
        else rab.style.display = 'none';
      }

      setupPostOwnerMenu(authorUid);

      loadMoreFromCommunity(data).catch(function () {});
    }

    let commentsUnsub = null;

    function wireCommentsListener() {
      if (commentsUnsub) {
        commentsUnsub();
        commentsUnsub = null;
      }
      const cq = query(collection(db, 'communityPosts', postId, 'comments'), orderBy('createdAt', 'asc'));
      commentsUnsub = onSnapshot(cq, function (csnap) {
        var next = csnap.docs.slice();
        if (commentDocsCompatibleForPatch(latestComments, next)) {
          latestComments = next;
          next.forEach(function (cd) {
            var d = cd.data() || {};
            var n = Math.max(0, Number(d.likes || d.likeCount || 0));
            var el = document.getElementById('clc-' + cd.id);
            if (el) el.textContent = String(n);
          });
          return;
        }
        latestComments = next;
        renderComments().catch(function () {});
      }, function () {
        listEl.innerHTML = '<p class="meta-pill">Could not load comments.</p>';
      });
    }

    let postUnsub = null;
    let postHydrated = false;

    function startPostListener() {
      if (postUnsub) { postUnsub(); postUnsub = null; }
      const pref = doc(db, 'communityPosts', postId);
      postUnsub = onSnapshot(pref, async function (snap) {
        if (!snap.exists) {
          loadingEl.hidden = true;
          shell.hidden = true;
          errEl.hidden = false;
          errEl.textContent = 'This post could not be found.';
          return;
        }
        const pdata = snap.data() || {};
        postData = pdata;
        loadingEl.hidden = true;
        errEl.hidden = true;
        shell.hidden = false;
        document.title = (pdata.title || 'Post') + ' | Livvo';
        if (!postHydrated) {
          await hydratePost(pdata);
          postHydrated = true;
          wireCommentsListener();
          recordPostViewOnce();
        } else {
          const cc = document.getElementById('post-comment-count');
          if (cc) cc.textContent = String(Number(pdata.commentCount || 0));
          const lc = document.getElementById('post-like-count');
          if (lc) {
            var srv = String(Number(pdata.upvoteCount || 0));
            if (lc.textContent !== srv) lc.textContent = srv;
          }
          updateCommentCountLabel();
          var rab2 = document.getElementById('request-answer-btn');
          if (rab2) {
            var showReq2 = String(pdata.type || '') === 'question' && !!currentUser;
            rab2.hidden = !showReq2;
            rab2.style.display = showReq2 ? 'flex' : 'none';
          }
        }
      }, function () {
        loadingEl.hidden = true;
        errEl.hidden = false;
        errEl.textContent = 'Could not load this post.';
      });
    }

    let authTimer = null;
    function scheduleRedirect() {
      if (authTimer) clearTimeout(authTimer);
      authTimer = setTimeout(function () {
        if (!auth.currentUser) {
          const ret = 'community-post.html?postId=' + encodeURIComponent(postId) + '&city=' + encodeURIComponent(city);
          window.location.href = 'signup.html?redirect=community&city=' + encodeURIComponent(city) + '&return=' + encodeURIComponent(ret);
        }
      }, 2000);
    }

    onAuthStateChanged(auth, async function (user) {
      if (!user) {
        scheduleRedirect();
        return;
      }
      if (authTimer) { clearTimeout(authTimer); authTimer = null; }
      currentUser = user;
      try {
        const pd = await getDoc(doc(db, 'users', user.uid));
        currentProfileData = pd.exists ? pd.data() : null;
      } catch (e) {
        currentProfileData = null;
      }
      populateThreadNavAvatar(user);
      fillComposerAvatar();
      startPostListener();
      if (postHydrated && postData) {
        setupPostOwnerMenu(postData.author || postData.authorId || '');
      }
    });
  </script>
</body>
</html>
