<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>List Your Property — Livvo</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #059669; --green-light: #10b981; --green-dark: #047857;
  --bg-dark: #f0f7f2; --surface-dark: #ffffff; --border-dark: #d4e5dc;
  --bg-light: #ffffff; --surface-light: #f7faf8; --border-light: #e4ede8;
  --text-dark: #1a2e24; --text-light: #1a2e24; --muted-dark: #4a7c5e; --muted-light: #4a7c5e;
}
html { scroll-behavior: smooth; }
body { background: var(--bg-dark); color: var(--text-dark); font-family: "DM Sans", sans-serif; min-height: 100vh; }

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  height: 64px; padding: 0 48px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(255,255,255,0.95); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border-dark);
}
.logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
.logo-icon { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, var(--green), var(--green-light)); display: flex; align-items: center; justify-content: center; }
.logo-word { font-family: "Outfit", sans-serif; font-weight: 800; font-size: 1.2rem; letter-spacing: -0.04em; color: var(--text-dark); }
.logo-word span { color: var(--green); }
.nav-back { font-size: 0.83rem; color: var(--muted-dark); text-decoration: none; display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
.nav-back:hover { color: var(--text-dark); }

/* PAGE */
.page { min-height: 100vh; padding: 100px 24px 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.auth-card {
  width: 100%; max-width: 420px;
  background: var(--surface-dark);
  border: 1px solid var(--border-dark);
  border-radius: 20px;
  padding: 40px 36px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.06);
}
.auth-card h1 { font-family: "Outfit", sans-serif; font-weight: 800; font-size: 1.5rem; letter-spacing: -0.03em; margin-bottom: 8px; }
.auth-card .sub { font-size: 0.88rem; color: var(--muted-dark); margin-bottom: 28px; line-height: 1.5; }

.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--muted-dark); margin-bottom: 8px; }
.form-group input {
  width: 100%; background: #ffffff;
  border: 1px solid var(--border-dark);
  border-radius: 10px;
  padding: 14px 16px;
  font-family: "DM Sans", sans-serif; font-size: 0.95rem;
  color: var(--text-dark);
  outline: none;
  transition: border-color 0.2s;
}
.form-group input::placeholder { color: var(--muted-dark); opacity: 0.7; }
.form-group input:focus { border-color: var(--green); }
.form-group input.error { border-color: #ef4444; }

.btn-primary {
  width: 100%; background: var(--green);
  color: white; border: none;
  border-radius: 10px;
  padding: 14px;
  font-family: "DM Sans", sans-serif; font-size: 0.95rem; font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
}
.btn-primary:hover { background: var(--green-dark); transform: translateY(-1px); }
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

.verify-note { font-size: 0.8rem; color: var(--muted-dark); margin-top: 20px; padding: 14px; background: rgba(5,150,105,0.08); border: 1px solid rgba(52,211,153,0.2); border-radius: 10px; line-height: 1.6; }
.verify-note strong { color: var(--green-light); }

.auth-footer { margin-top: 24px; text-align: center; font-size: 0.85rem; color: var(--muted-dark); }
.auth-footer a { color: var(--green); text-decoration: none; font-weight: 600; }
.auth-footer a:hover { text-decoration: underline; }

.step-indicator { display: flex; gap: 8px; margin-bottom: 24px; }
.step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border-dark); transition: background 0.2s; }
.step-dot.active { background: var(--green-light); }
.step-dot.done { background: var(--green); }

.profile-photo-zone {
  width: 120px; height: 120px; margin: 0 auto 20px;
  border: 2px dashed var(--border-dark); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; overflow: hidden; transition: all 0.2s;
  background: var(--surface-light);
}
.profile-photo-zone:hover { border-color: var(--green); background: rgba(5,150,105,0.06); }
.profile-photo-zone img { width: 100%; height: 100%; object-fit: cover; }
.profile-photo-zone .placeholder { font-size: 2.5rem; opacity: 0.5; }
.robot-check { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--surface-light); border: 1px solid var(--border-dark); border-radius: 10px; margin: 20px 0; cursor: pointer; }
.robot-check input { accent-color: var(--green); width: 18px; height: 18px; cursor: pointer; flex-shrink: 0; }
.robot-check span { font-size: 0.9rem; }

.success-msg { display: none; text-align: center; padding: 24px; }
.success-msg.show { display: block; }
.success-msg .icon { width: 48px; height: 48px; margin: 0 auto 16px; background: rgba(5,150,105,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--green-light); font-size: 1.5rem; }
.success-msg h3 { font-family: "Outfit", sans-serif; font-weight: 700; font-size: 1.2rem; margin-bottom: 8px; }
.success-msg p { font-size: 0.9rem; color: var(--muted-dark); margin-bottom: 20px; }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 18 18" fill="none" width="16" height="16"><path d="M2 3L9 15L16 3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <span class="logo-word">li<span>vv</span>o</span>
  </a>
  <a href="index.html" class="nav-back">← Back to Livvo</a>
</nav>

<div class="page">
  <div class="auth-card">
    <h1>Create your landlord account</h1>
    <p class="sub">List your property and reach thousands of verified tenants.</p>
    <form id="signupForm" onsubmit="return false;">
      <div class="form-group">
        <label for="signup-email">Email</label>
        <input id="signup-email" type="email" name="email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="signup-password">Password</label>
        <input id="signup-password" type="password" name="password" placeholder="Min. 8 characters" required minlength="8" autocomplete="new-password" />
      </div>
      <div id="signup-error" style="display:none;padding:12px 16px;border-radius:10px;margin-bottom:16px;font-size:0.9rem;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#b91c1c;"></div>
      <button type="button" class="btn-primary" id="signup-btn">Create account</button>
    </form>
  </div>

  <p class="auth-footer">Already have an account? <a href="landlord-login.html">Log in</a></p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBfKo7gumTCJ1FtqnrV-uGAgoIvhZPowTI",
    authDomain: "livvo-573e1.firebaseapp.com",
    projectId: "livvo-573e1",
    storageBucket: "livvo-573e1.firebasestorage.app",
    messagingSenderId: "438563892670",
    appId: "1:438563892670:web:c038316d9d3fcbee065def"
  };

  const auth = getAuth(initializeApp(firebaseConfig));
  const form = document.getElementById('signupForm');
  const errorEl = document.getElementById('signup-error');
  const btn = document.getElementById('signup-btn');

  function getFriendlyError(code) {
    const errors = {
      'auth/email-already-in-use': 'An account with this email already exists. Try logging in instead.',
      'auth/invalid-email': 'Please enter a valid email address.',
      'auth/weak-password': 'Password is too weak. Use at least 8 characters.',
      'auth/too-many-requests': 'Too many attempts. Please try again later.'
    };
    return errors[code] || 'Something went wrong. Please try again.';
  }

  btn.addEventListener('click', async function () {
    if (!form.checkValidity()) {
      form.reportValidity();
      return;
    }
    errorEl.style.display = 'none';
    errorEl.textContent = '';
    const email = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    btn.disabled = true;
    try {
      await createUserWithEmailAndPassword(auth, email, password);
      localStorage.setItem('livvo_landlord_email', email);
      localStorage.setItem('livvo_landlord_logged_in', '1');
      window.location.href = 'landlord-dashboard.html';
    } catch (err) {
      errorEl.textContent = getFriendlyError(err.code);
      errorEl.style.display = 'block';
    } finally {
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
