<link rel="stylesheet" href="livvo-base.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #059669; --green-light: #10b981; --green-dark: #047857;
  --bg-dark: #f0f7f2; --surface-dark: #ffffff; --border-dark: #d4e5dc;
  --text-dark: #1a2e24; --muted-dark: #4a7c5e;
}
body { background: var(--bg-dark); color: var(--text-dark); font-family: "DM Sans", sans-serif; min-height: 100vh; }
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; height: 64px; padding: 0 48px; display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.95); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border-dark); }
.logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
.logo-icon { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, var(--green), var(--green-light)); display: flex; align-items: center; justify-content: center; }
.logo-word { font-family: "Sora", sans-serif; font-weight: 800; font-size: 1.2rem; letter-spacing: -0.04em; color: var(--text-dark); }
.logo-word span { color: var(--green); }
.nav-back { font-size: 0.83rem; color: var(--muted-dark); text-decoration: none; }
.nav-back:hover { color: var(--text-dark); }

.page { min-height: 100vh; padding: 100px 24px 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.auth-card { width: 100%; max-width: 420px; background: var(--surface-dark); border: 1px solid var(--border-dark); border-radius: 20px; padding: 40px 36px; box-shadow: 0 16px 48px rgba(0,0,0,0.06); }
.auth-card h1 { font-family: "Sora", sans-serif; font-weight: 800; font-size: 1.5rem; margin-bottom: 8px; }
.auth-card .sub { font-size: 0.88rem; color: var(--muted-dark); margin-bottom: 24px; line-height: 1.5; }

.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--muted-dark); margin-bottom: 8px; }
.form-group input { width: 100%; background: #ffffff; border: 1px solid var(--border-dark); border-radius: 10px; padding: 14px 16px; font-family: inherit; font-size: 0.95rem; color: var(--text-dark); outline: none; }
.form-group input:focus { border-color: var(--green); }
.btn-primary { width: 100%; background: var(--green); color: white; border: none; border-radius: 10px; padding: 14px; font-size: 0.95rem; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-primary:hover { background: var(--green-dark); }
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

#reset-success, #reset-error {
  padding: 12px 16px;
  border-radius: 10px;
  margin-bottom: 20px;
  font-size: 0.9rem;
  line-height: 1.45;
  display: none;
}
#reset-success {
  background: rgba(5,150,105,0.1);
  border: 1px solid rgba(5,150,105,0.2);
  color: var(--green-dark);
}
#reset-error {
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.2);
  color: #b91c1c;
}

.auth-footer { margin-top: 24px; text-align: center; font-size: 0.85rem; color: var(--muted-dark); }
.auth-footer a { color: var(--green); text-decoration: none; font-weight: 600; }
.auth-footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo"><div class="logo-icon"><svg viewBox="0 0 18 18" fill="none" width="16" height="16"><path d="M2 3L9 15L16 3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span class="logo-word">li<span>vv</span>o</span></a>
  <a href="signup.html?redirect=landlord" class="nav-back">← Back to log in</a>
</nav>
<div class="page">
  <div class="auth-card">
    <h1>Forgot password?</h1>
    <p class="sub">Enter your email and we'll send you a link to reset your password.</p>
    <div id="reset-success" role="status"></div>
    <div id="reset-error" role="alert"></div>
    <form onsubmit="return false;">
      <div class="form-group">
        <label for="reset-email">Email</label>
        <input type="email" id="reset-email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <button type="button" class="btn-primary" id="reset-btn">Send reset link</button>
    </form>
  </div>
  <p class="auth-footer">Remember your password? <a href="signup.html?redirect=landlord">Log in</a></p>
</div>

<script type="module">
  import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBfKo7gumTCJ1FtqnrV-uGAgoIvhZPowTI",
    authDomain: "livvo-573e1.firebaseapp.com",
    projectId: "livvo-573e1",
    storageBucket: "livvo-573e1.firebasestorage.app",
    messagingSenderId: "438563892670",
    appId: "1:438563892670:web:c038316d9d3fcbee065def"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const resetEmailEl = document.getElementById('reset-email');
  const resetBtn = document.getElementById('reset-btn');
  const resetSuccess = document.getElementById('reset-success');
  const resetError = document.getElementById('reset-error');

  function hideMessages() {
    resetSuccess.style.display = 'none';
    resetError.style.display = 'none';
    resetSuccess.textContent = '';
    resetError.textContent = '';
  }

  resetEmailEl.addEventListener('input', hideMessages);

  resetBtn.addEventListener('click', async () => {
    hideMessages();
    const email = (resetEmailEl.value || '').trim();
    if (!email) {
      resetEmailEl.reportValidity();
      return;
    }
    resetBtn.disabled = true;
    try {
      await sendPasswordResetEmail(auth, email);
      resetSuccess.textContent = 'Password reset email sent! Check your inbox — and your spam folder just in case.';
      resetSuccess.style.display = 'block';
    } catch (error) {
      resetError.textContent = 'No account found with this email.';
      resetError.style.display = 'block';
    } finally {
      resetBtn.disabled = false;
    }
  });
</script>
</body>
</html>
