<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Livvo Landlord</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #059669; --green-light: #10b981; --green-dark: #047857;
  --bg-dark: #f0f7f2; --surface-dark: #ffffff; --border-dark: #d4e5dc;
  --text-dark: #1a2e24; --muted-dark: #4a7c5e;
}
body { background: var(--bg-dark); color: var(--text-dark); font-family: "DM Sans", sans-serif; min-height: 100vh; }
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; height: 64px; padding: 0 48px; display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.95); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border-dark); }
.logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
.logo-icon { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, var(--green), var(--green-light)); display: flex; align-items: center; justify-content: center; }
.logo-word { font-family: "Outfit", sans-serif; font-weight: 800; font-size: 1.2rem; letter-spacing: -0.04em; color: var(--text-dark); }
.logo-word span { color: var(--green); }
.nav-back { font-size: 0.83rem; color: var(--muted-dark); text-decoration: none; }
.nav-back:hover { color: var(--text-dark); }

.page { min-height: 100vh; padding: 100px 24px 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.auth-card { width: 100%; max-width: 420px; background: var(--surface-dark); border: 1px solid var(--border-dark); border-radius: 20px; padding: 40px 36px; box-shadow: 0 16px 48px rgba(0,0,0,0.06); }
.auth-card h1 { font-family: "Outfit", sans-serif; font-weight: 800; font-size: 1.5rem; margin-bottom: 8px; }
.auth-card .sub { font-size: 0.88rem; color: var(--muted-dark); margin-bottom: 24px; line-height: 1.5; }

.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--muted-dark); margin-bottom: 8px; }
.form-group input { width: 100%; background: #ffffff; border: 1px solid var(--border-dark); border-radius: 10px; padding: 14px 16px; font-family: inherit; font-size: 0.95rem; color: var(--text-dark); outline: none; }
.form-group input:focus { border-color: var(--green); }
.btn-primary { width: 100%; background: var(--green); color: white; border: none; border-radius: 10px; padding: 14px; font-size: 0.95rem; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-primary:hover { background: var(--green-dark); }
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

.msg { padding: 12px 16px; border-radius: 10px; margin-bottom: 20px; font-size: 0.9rem; display: none; }
.msg.success { background: rgba(5,150,105,0.1); border: 1px solid rgba(5,150,105,0.2); color: var(--green-dark); display: block; }
.msg.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #b91c1c; display: block; }

.auth-footer { margin-top: 24px; text-align: center; font-size: 0.85rem; color: var(--muted-dark); }
.auth-footer a { color: var(--green); text-decoration: none; font-weight: 600; }
.auth-footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo"><div class="logo-icon"><svg viewBox="0 0 18 18" fill="none" width="16" height="16"><path d="M2 3L9 15L16 3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span class="logo-word">li<span>vv</span>o</span></a>
  <a href="landlord-login.html" class="nav-back">← Back to log in</a>
</nav>
<div class="page">
  <div class="auth-card">
    <h1>Forgot password?</h1>
    <p class="sub">Enter your email and we'll send you a link to reset your password.</p>
    <div id="msg" class="msg"></div>
    <form id="resetForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" id="email" placeholder="you@example.com" required />
      </div>
      <button type="submit" class="btn-primary" id="btnSubmit">Send reset link</button>
    </form>
  </div>
  <p class="auth-footer">Remember your password? <a href="landlord-login.html">Log in</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
  const msg = document.getElementById('msg');
  const form = document.getElementById('resetForm');
  const btn = document.getElementById('btnSubmit');

  function showMsg(text, type) {
    msg.textContent = text;
    msg.className = 'msg ' + (type || '');
    msg.style.display = 'block';
  }

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    const sb = getLivvoSupabase();
    if (!sb) {
      showMsg('Supabase is not configured. Please add your project URL and anon key in supabase-config.js.', 'error');
      return;
    }
    const email = document.getElementById('email').value.trim();
    btn.disabled = true;
    msg.style.display = 'none';
    try {
      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + window.location.pathname.replace('landlord-forgot-password.html', 'landlord-login.html')
      });
      if (error) throw error;
      showMsg('Check your email. We\'ve sent you a link to reset your password.', 'success');
      form.reset();
    } catch (err) {
      if (err.message && err.message.toLowerCase().includes('user')) {
        showMsg('No account found with this email. Check the address or sign up first.', 'error');
      } else if (err.message && err.message.toLowerCase().includes('email')) {
        showMsg('Please enter a valid email address.', 'error');
      } else {
        showMsg(err.message || 'Something went wrong. Please try again.', 'error');
      }
    }
    btn.disabled = false;
  });
</script>
</body>
</html>
