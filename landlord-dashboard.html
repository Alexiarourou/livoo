<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landlord Dashboard — Livvo</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #059669; --green-light: #10b981; --green-dark: #047857;
  --bg-dark: #f0f7f2; --surface-dark: #ffffff; --border-dark: #d4e5dc;
  --bg-light: #ffffff; --surface-light: #f7faf8; --border-light: #e4ede8;
  --text-dark: #1a2e24; --text-light: #1a2e24; --muted-dark: #4a7c5e; --muted-light: #4a7c5e;
}
html { scroll-behavior: smooth; }
body { background: var(--bg-dark); color: var(--text-dark); font-family: "DM Sans", sans-serif; min-height: 100vh; }

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  height: 64px; padding: 0 48px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(255,255,255,0.95); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border-dark);
}
.logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
.logo-icon { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, var(--green), var(--green-light)); display: flex; align-items: center; justify-content: center; }
.logo-word { font-family: "Outfit", sans-serif; font-weight: 800; font-size: 1.2rem; letter-spacing: -0.04em; color: var(--text-dark); }
.logo-word span { color: var(--green); }
.nav-links { display: flex; align-items: center; gap: 20px; }
.nav-links a { font-size: 0.85rem; color: var(--muted-dark); text-decoration: none; display: flex; align-items: center; gap: 6px; }
.nav-links a:hover { color: var(--text-dark); }
.notif-badge { background: var(--green); color: white; font-size: 0.65rem; font-weight: 700; padding: 2px 6px; border-radius: 100px; min-width: 18px; text-align: center; }

.page { max-width: 1200px; margin: 0 auto; padding: 100px 24px 80px; }
.dash-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; margin-bottom: 40px; }
.dash-header h1 { font-family: "Outfit", sans-serif; font-weight: 800; font-size: 1.8rem; letter-spacing: -0.03em; }
.dash-header .btn-add { background: var(--green); color: white; padding: 12px 24px; border-radius: 10px; font-size: 0.9rem; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; }
.dash-header .btn-add:hover { background: var(--green-dark); }

/* Tabs */
.dash-tabs-wrap { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; border-bottom: 1px solid var(--border-dark); flex-wrap: wrap; }
.back-dash { display: inline-flex; align-items: center; gap: 6px; font-size: 0.85rem; color: var(--muted-dark); text-decoration: none; padding: 8px 0; transition: color 0.2s; }
.back-dash:hover { color: var(--green); }
.back-dash svg { width: 18px; height: 18px; }
.dash-tabs { display: flex; gap: 4px; }
.dash-tab { padding: 12px 20px; font-size: 0.9rem; color: var(--muted-dark); background: none; border: none; font-family: inherit; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -1px; transition: all 0.2s; }
.dash-tab:hover { color: var(--text-dark); }
.dash-tab.active { color: var(--green); border-bottom-color: var(--green); font-weight: 600; }
.dash-panel { display: none; }
.dash-panel.active { display: block; }

/* Cards grid */
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; }
.card {
  background: var(--surface-dark);
  border: 1px solid var(--border-dark);
  border-radius: 16px;
  overflow: hidden;
  transition: all 0.25s;
}
.card:hover { border-color: rgba(52,211,153,0.3); }
.card-img { aspect-ratio: 16/10; background: #0d2a18; position: relative; overflow: hidden; }
.card-img img { width: 100%; height: 100%; object-fit: cover; }
.card-img .status { position: absolute; top: 12px; left: 12px; padding: 4px 12px; border-radius: 100px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
.card-edit-btn {
  position: absolute; top: 12px; right: 12px;
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.95); border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--green); transition: all 0.2s;
}
.card-edit-btn:hover { background: white; transform: scale(1.08); }
.card-edit-btn svg { width: 18px; height: 18px; }
.status.live { background: var(--green); color: white; }
.status.rented { background: #f59e0b; color: white; }
.status.draft { background: var(--muted-dark); color: var(--text-dark); }
.card-body { padding: 20px; }
.card-title { font-family: "Outfit", sans-serif; font-weight: 700; font-size: 1.05rem; margin-bottom: 8px; }
.card-meta { font-size: 0.83rem; color: var(--muted-dark); margin-bottom: 16px; }
.card-actions { display: flex; gap: 10px; flex-wrap: wrap; }
.card-actions .btn { padding: 8px 16px; border-radius: 8px; font-size: 0.82rem; font-weight: 600; text-decoration: none; display: inline-block; transition: all 0.2s; }
.card-actions .btn-primary { background: var(--green); color: white; border: none; cursor: pointer; }
.card-actions .btn-primary:hover { background: var(--green-dark); }
.card-actions .btn-outline { background: transparent; color: var(--muted-dark); border: 1px solid var(--border-dark); }
.card-actions .btn-outline:hover { border-color: var(--green); color: var(--text-dark); }

/* Notifications */
.notif-list { display: flex; flex-direction: column; gap: 0; }
.notif-item {
  display: flex; align-items: flex-start; gap: 16px;
  padding: 18px 20px;
  border-bottom: 1px solid var(--border-dark);
  transition: background 0.2s;
  cursor: pointer;
}
.notif-item:hover { background: rgba(5,150,105,0.06); }
.notif-item.unread { background: rgba(5,150,105,0.04); }
.notif-item:last-child { border-bottom: none; }
.notif-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--green), var(--green-light)); display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
.notif-star {
  flex-shrink: 0; width: 36px; height: 36px; border-radius: 50%;
  background: none; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--border-dark); transition: all 0.2s;
}
.notif-star:hover { color: #f59e0b; transform: scale(1.1); }
.notif-star.starred { color: #f59e0b; }
.notif-star svg { width: 20px; height: 20px; }
.notif-body { flex: 1; min-width: 0; }
.notif-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; }
.notif-text { font-size: 0.85rem; color: var(--muted-dark); line-height: 1.5; margin-bottom: 6px; }
.notif-time { font-size: 0.75rem; color: var(--muted-dark); opacity: 0.8; }
.empty-state { text-align: center; padding: 64px 24px; color: var(--muted-dark); }
.empty-state h3 { font-family: "Outfit", sans-serif; font-size: 1.1rem; color: var(--text-dark); margin-bottom: 8px; }

/* Messages */
.msg-panel { display: flex; gap: 0; min-height: 480px; border: 1px solid var(--border-dark); border-radius: 16px; overflow: hidden; background: var(--surface-dark); }
.msg-list-wrap { width: 300px; flex-shrink: 0; border-right: 1px solid var(--border-dark); display: flex; flex-direction: column; }
.msg-list { display: flex; flex-direction: column; gap: 0; flex: 1; overflow-y: auto; }
.msg-item {
  display: flex; align-items: center; gap: 16px;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border-dark);
  cursor: pointer;
  transition: background 0.2s;
  text-decoration: none; color: inherit;
}
.msg-item:hover { background: rgba(5,150,105,0.06); }
.msg-item.active { background: rgba(5,150,105,0.08); }
.msg-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--green), var(--green-light)); display: flex; align-items: center; justify-content: center; font-weight: 700; color: white; flex-shrink: 0; }
.msg-body { flex: 1; min-width: 0; }
.msg-name { font-weight: 600; font-size: 0.92rem; margin-bottom: 2px; }
.msg-preview { font-size: 0.83rem; color: var(--muted-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.msg-meta { text-align: right; flex-shrink: 0; }
.msg-time { font-size: 0.75rem; color: var(--muted-dark); }
.msg-unread { width: 8px; height: 8px; border-radius: 50%; background: var(--green); margin-left: 8px; display: inline-block; }

.chat-wrap { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.chat-placeholder { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--muted-dark); font-size: 0.95rem; padding: 40px; text-align: center; }
.chat-view { flex: 1; display: none; flex-direction: column; }
.chat-view.open { display: flex; }
.chat-header { padding: 16px 24px; border-bottom: 1px solid var(--border-dark); display: flex; align-items: center; gap: 16px; }
.chat-back { width: 36px; height: 36px; border-radius: 50%; background: rgba(5,150,105,0.1); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--green); flex-shrink: 0; transition: all 0.2s; }
.chat-back:hover { background: rgba(5,150,105,0.18); }
.chat-header .msg-avatar { width: 40px; height: 40px; font-size: 0.9rem; }
.chat-header-info { flex: 1; }
.chat-header-name { font-weight: 700; font-size: 1rem; }
.chat-header-meta { font-size: 0.8rem; color: var(--muted-dark); }
.chat-messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
.chat-msg { max-width: 75%; padding: 12px 18px; border-radius: 16px; font-size: 0.92rem; line-height: 1.5; }
.chat-msg.them { align-self: flex-start; background: rgba(5,150,105,0.08); border: 1px solid rgba(5,150,105,0.15); }
.chat-msg.you { align-self: flex-end; background: var(--green); color: white; }
.chat-msg .time { font-size: 0.7rem; opacity: 0.8; margin-top: 4px; }
.chat-input-wrap { padding: 16px 24px; border-top: 1px solid var(--border-dark); display: flex; gap: 12px; align-items: flex-end; }
.chat-input { flex: 1; background: var(--bg-dark); border: 1px solid var(--border-dark); border-radius: 12px; padding: 14px 18px; font-family: inherit; font-size: 0.95rem; color: var(--text-dark); resize: none; min-height: 48px; max-height: 120px; outline: none; }
.chat-input:focus { border-color: var(--green); }
.btn-send-msg { background: var(--green); color: white; border: none; border-radius: 12px; padding: 14px 24px; font-family: inherit; font-size: 0.9rem; font-weight: 600; cursor: pointer; flex-shrink: 0; }
.btn-send-msg:hover { background: var(--green-dark); }

/* Property detail modal / inline */
.prop-detail {
  background: var(--surface-dark);
  border: 1px solid var(--border-dark);
  border-radius: 20px;
  padding: 32px;
  margin-bottom: 24px;
}
.prop-detail h3 { font-family: "Outfit", sans-serif; font-weight: 700; font-size: 1.2rem; margin-bottom: 20px; }
.detail-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
@media (max-width: 600px) { .detail-grid { grid-template-columns: 1fr; } }
.detail-field label { display: block; font-size: 0.75rem; color: var(--muted-dark); margin-bottom: 6px; }
.detail-field input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border-dark); border-radius: 10px; padding: 12px 14px; color: var(--text-dark); font-family: inherit; font-size: 0.95rem; }
.detail-field input:focus { outline: none; border-color: var(--green); }
.discount-badge { display: inline-block; background: rgba(239,68,68,0.2); color: #f87171; padding: 4px 10px; border-radius: 100px; font-size: 0.78rem; font-weight: 600; margin-left: 8px; }
.booking-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; background: rgba(5,150,105,0.08); border: 1px solid rgba(52,211,153,0.2); border-radius: 12px; margin-top: 16px; }
.booking-row .dates { font-size: 0.9rem; font-weight: 600; }
.booking-row .tenant { font-size: 0.83rem; color: var(--muted-dark); }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <div class="logo-icon"><svg viewBox="0 0 18 18" fill="none" width="16" height="16"><path d="M2 3L9 15L16 3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <span class="logo-word">li<span>vv</span>o</span>
  </a>
  <div class="nav-links">
    <a href="landlord-dashboard.html" id="navDashboard" onclick="navToTab(event,'properties')">Dashboard</a>
    <a href="landlord-dashboard.html#notifications" id="navNotifications" onclick="navToTab(event,'notifications')">Notifications <span class="notif-badge" id="notifCount">2</span></a>
    <a href="landlord-dashboard.html#messages" id="navMessages" onclick="navToTab(event,'messages')">Messages</a>
    <a href="landlord-list-property.html" class="btn-add">+ List property</a>
    <a href="#" id="logoutLink">Log out</a>
  </div>
</nav>

<div class="page">
  <div class="dash-header">
    <h1>Your properties</h1>
    <a href="landlord-list-property.html" class="btn-add">+ List a property</a>
  </div>

  <div class="dash-tabs-wrap">
    <a href="#" class="back-dash" id="backToDashboard" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Dashboard
    </a>
    <div class="dash-tabs">
      <button class="dash-tab active" onclick="switchTab('properties')">Properties</button>
      <button class="dash-tab" onclick="switchTab('notifications')">Notifications</button>
      <button class="dash-tab" onclick="switchTab('messages')">Messages</button>
    </div>
  </div>

  <!-- Panel: Properties -->
  <div class="dash-panel active" id="panel-properties">
    <div class="cards-grid" id="propertiesGrid">
      <!-- Filled by JS -->
    </div>
    <div id="propDetail" class="prop-detail" style="display:none">
      <h3 id="propDetailTitle">Property details</h3>
      <div class="detail-grid">
        <div class="detail-field">
          <label>Price (€/month)</label>
          <input type="number" id="editPrice" min="1" />
        </div>
        <div class="detail-field">
          <label>Discount % (optional)</label>
          <input type="number" id="editDiscount" placeholder="0" min="0" max="50" />
        </div>
      </div>
      <div id="bookingInfo" style="margin-top:20px"></div>
      <div style="margin-top:20px">
        <button class="card-actions btn btn-primary" onclick="savePrice()">Save changes</button>
      </div>
    </div>
  </div>

  <!-- Panel: Notifications -->
  <div class="dash-panel" id="panel-notifications">
    <div class="notif-list" id="notifList">
      <!-- Filled by JS -->
    </div>
  </div>

  <!-- Panel: Messages -->
  <div class="dash-panel" id="panel-messages">
    <div class="msg-panel">
      <div class="msg-list-wrap">
        <div class="msg-list" id="msgConversationList"></div>
      </div>
      <div class="chat-wrap">
        <div class="chat-placeholder" id="chatPlaceholder">
          <p>Select a conversation to view messages and reply to potential tenants.<br>All conversations happen through Livvo.</p>
        </div>
        <div class="chat-view" id="chatView">
          <div class="chat-header" id="chatHeader"></div>
          <div class="chat-messages" id="chatMessages"></div>
          <div class="chat-input-wrap">
            <textarea class="chat-input" id="chatInput" placeholder="Type your message..." rows="1"></textarea>
            <button class="btn-send-msg" id="btnSendMsg">Send</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="firebase-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script>
  (function checkAuth() {
    if (localStorage.getItem('livvo_landlord_verified') || localStorage.getItem('livvo_landlord_logged_in')) return;
    if (typeof isFirebaseConfigured === 'function' && isFirebaseConfigured()) {
      try {
        if (!firebase.apps.length) firebase.initializeApp(LIVVO_FIREBASE_CONFIG);
        firebase.auth().onAuthStateChanged(function(user) {
          if (user) {
            localStorage.setItem('livvo_landlord_email', user.email);
            localStorage.setItem('livvo_landlord_logged_in', '1');
          } else if (!localStorage.getItem('livvo_landlord_logged_in')) {
            window.location.href = 'landlord-login.html';
          }
        });
        return;
      } catch (e) {}
    }
    window.location.href = 'landlord-login.html';
  })();

  document.getElementById('logoutLink').addEventListener('click', function(e) {
    e.preventDefault();
    localStorage.removeItem('livvo_landlord_logged_in');
    localStorage.removeItem('livvo_landlord_email');
    localStorage.removeItem('livvo_landlord_password');
    localStorage.removeItem('livvo_landlord_verified');
    if (typeof isFirebaseConfigured === 'function' && isFirebaseConfigured() && firebase.auth().currentUser) {
      firebase.auth().signOut();
    }
    window.location.href = 'landlord-login.html';
  });

  function switchTab(id) {
    document.querySelectorAll('.dash-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.dash-panel').forEach(p => p.classList.remove('active'));
    document.querySelector('.dash-tab[onclick*="'+id+'"]').classList.add('active');
    document.getElementById('panel-'+id).classList.add('active');
    document.getElementById('backToDashboard').style.display = id === 'properties' ? 'none' : 'inline-flex';
    if (id !== 'messages') closeChat();
    location.hash = id === 'properties' ? '' : id;
  }

  function navToTab(e, id) {
    if (location.pathname.includes('landlord-dashboard') || location.pathname === '/' || location.pathname.endsWith('/')) {
      e.preventDefault();
      switchTab(id);
    }
  }

  document.getElementById('backToDashboard').addEventListener('click', function(e) {
    e.preventDefault();
    switchTab('properties');
  });

  let properties = JSON.parse(localStorage.getItem('livvo_properties') || '[]');
  if (properties.length === 0) {
    properties = [{
      id: 'demo1',
      title: 'Stylish 2-Bed Apartment with Terrace',
      price: 700,
      city: 'athens',
      address: 'Platia Viktoria, Athens 104 38',
      status: 'live',
      discount: 0,
      booking: { tenant: 'Lucas M.', from: 'Apr 1, 2026', to: 'Sep 30, 2026', months: 6 }
    }];
  }

  const grid = document.getElementById('propertiesGrid');
  const detail = document.getElementById('propDetail');
  let editingId = null;

  function renderProperties() {
    grid.innerHTML = properties.map(p => `
      <div class="card">
        <div class="card-img">${(p.photos && p.photos[0]) ? '<img src="'+p.photos[0]+'" alt=""/>' : ''}<span class="status ${p.status || 'live'}">${p.booking ? 'Rented' : 'Live'}</span><a href="landlord-edit-property.html?id=${p.id}" class="card-edit-btn" title="Edit property – photos, details, amenities"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></a></div>
        <div class="card-body">
          <div class="card-title">${p.title}</div>
          <div class="card-meta">€${p.price}/mo ${p.discount ? '<span class="discount-badge">-' + p.discount + '%</span>' : ''} · ${p.city}</div>
          ${p.booking ? `<div class="card-meta">Rented until ${p.booking.to}</div>` : ''}
          <div class="card-actions">
            <button class="btn btn-primary" onclick="editProperty('${p.id}')">Manage pricing</button>
            <a href="search-athens.html" class="btn btn-outline">View listing</a>
          </div>
        </div>
      </div>
    `).join('');
  }

  function editProperty(id) {
    const p = properties.find(x => x.id === id);
    if (!p) return;
    editingId = id;
    document.getElementById('editPrice').value = p.price;
    document.getElementById('editDiscount').value = p.discount || 0;
    document.getElementById('propDetailTitle').textContent = p.title;
    const bookEl = document.getElementById('bookingInfo');
    if (p.booking) {
      bookEl.innerHTML = `<div class="booking-row">
        <span class="dates">${p.booking.from} – ${p.booking.to}</span>
        <span class="tenant">${p.booking.tenant} · ${p.booking.months} months</span>
      </div>`;
      bookEl.style.display = 'block';
    } else {
      bookEl.innerHTML = '';
      bookEl.style.display = 'none';
    }
    detail.style.display = 'block';
    detail.scrollIntoView({ behavior: 'smooth' });
  }

  function savePrice() {
    if (!editingId) return;
    const p = properties.find(x => x.id === editingId);
    if (!p) return;
    p.price = parseInt(document.getElementById('editPrice').value) || p.price;
    p.discount = parseInt(document.getElementById('editDiscount').value) || 0;
    localStorage.setItem('livvo_properties', JSON.stringify(properties));
    renderProperties();
    detail.style.display = 'none';
    editingId = null;
  }
  window.editProperty = editProperty;
  window.savePrice = savePrice;

  renderProperties();

  // Notifications with star
  const DEMO_NOTIFICATIONS = [
    { id: 'n1', avatar: 'M', title: 'New booking request', text: 'Marie is interested in your Stylish 2-Bed Apartment. She wants to stay from Mar 15 – Jun 15 (3 months).', time: '2 hours ago', unread: true },
    { id: 'n2', avatar: 'J', title: 'Message from Jakob', text: '"Hi! Is the terrace private? And is there parking nearby?"', time: '5 hours ago', unread: true },
    { id: 'n3', avatar: 'L', title: 'Booking confirmed', text: 'Lucas has booked your Athens apartment for 6 months (Apr 1 – Sep 30).', time: 'Yesterday', unread: false }
  ];
  let notifications = JSON.parse(localStorage.getItem('livvo_landlord_notifications') || 'null');
  if (!notifications || notifications.length === 0) {
    notifications = JSON.parse(JSON.stringify(DEMO_NOTIFICATIONS));
  }
  let starredIds = JSON.parse(localStorage.getItem('livvo_landlord_starred_notifications') || '[]');

  function toggleStarNotif(id) {
    const idx = starredIds.indexOf(id);
    if (idx >= 0) starredIds.splice(idx, 1);
    else starredIds.push(id);
    localStorage.setItem('livvo_landlord_starred_notifications', JSON.stringify(starredIds));
    renderNotifications();
  }
  window.toggleStarNotif = toggleStarNotif;

  function renderNotifications() {
    const list = document.getElementById('notifList');
    list.innerHTML = notifications.map(n => `
      <div class="notif-item ${n.unread ? 'unread' : ''}" data-id="${n.id}">
        <div class="notif-avatar">${n.avatar}</div>
        <div class="notif-body">
          <div class="notif-title">${n.title}</div>
          <div class="notif-text">${n.text}</div>
          <div class="notif-time">${n.time}</div>
        </div>
        <button class="notif-star ${starredIds.includes(n.id) ? 'starred' : ''}" onclick="toggleStarNotif('${n.id}')" title="${starredIds.includes(n.id) ? 'Unstar' : 'Star'}">
          <svg viewBox="0 0 24 24" fill="${starredIds.includes(n.id) ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        </button>
      </div>
    `).join('');
  }
  renderNotifications();

  // Hash routing - load correct tab from URL
  if (location.hash === '#notifications') switchTab('notifications');
  else if (location.hash === '#messages') switchTab('messages');
  window.addEventListener('hashchange', function() {
    if (location.hash === '#notifications') switchTab('notifications');
    else if (location.hash === '#messages') switchTab('messages');
    else if (!location.hash || location.hash === '#') switchTab('properties');
  });

  // Messages / Chat
  const DEMO_CONVERSATIONS = [
    { id: 'marie', name: 'Marie L.', initial: 'M', preview: "Hi! I'm an Erasmus student, very interested in your apartment…", time: '2h ago', unread: true, property: 'Stylish 2-Bed Apartment' },
    { id: 'jakob', name: 'Jakob K.', initial: 'J', preview: "Thanks for the info! I'll confirm my dates and send the booking...", time: '5h ago', unread: false, property: 'Stylish 2-Bed Apartment' }
  ];
  const DEMO_MESSAGES = {
    marie: [
      { text: "Hi! I'm an Erasmus student from France, very interested in your Stylish 2-Bed Apartment. Is it still available for March?", them: true, time: '2h ago' },
      { text: "Yes, it's available! March works. The terrace is private and there's street parking nearby.", them: false, time: '1h ago' },
      { text: "Perfect! Is the terrace private? And is there parking nearby? I'm looking for 3 months.", them: true, time: '45m ago' }
    ],
    jakob: [
      { text: "Hi! I saw your Athens apartment. Is the terrace private?", them: true, time: '5h ago' },
      { text: "Yes, the terrace is fully private. Great for working or relaxing.", them: false, time: '4h ago' },
      { text: "Thanks for the info! I'll confirm my dates and send the booking request.", them: true, time: '5h ago' }
    ]
  };

  let conversations = JSON.parse(localStorage.getItem('livvo_landlord_conversations') || 'null');
  let chatMessages = JSON.parse(localStorage.getItem('livvo_landlord_chat_messages') || 'null');
  if (!conversations || conversations.length === 0) {
    conversations = JSON.parse(JSON.stringify(DEMO_CONVERSATIONS));
    chatMessages = JSON.parse(JSON.stringify(DEMO_MESSAGES));
  }
  if (!chatMessages || typeof chatMessages !== 'object') {
    chatMessages = JSON.parse(JSON.stringify(DEMO_MESSAGES));
  }

  let activeChatId = null;

  function saveChatData() {
    localStorage.setItem('livvo_landlord_conversations', JSON.stringify(conversations));
    localStorage.setItem('livvo_landlord_chat_messages', JSON.stringify(chatMessages));
  }

  function renderConversationList() {
    const list = document.getElementById('msgConversationList');
    list.innerHTML = conversations.map(c => `
      <div class="msg-item ${activeChatId === c.id ? 'active' : ''}" data-id="${c.id}">
        <div class="msg-avatar">${c.initial}</div>
        <div class="msg-body">
          <div class="msg-name">${c.name} ${c.unread ? '<span class="msg-unread"></span>' : ''}</div>
          <div class="msg-preview">${c.preview || 'No messages yet'}</div>
        </div>
        <div class="msg-meta"><span class="msg-time">${c.time || ''}</span></div>
      </div>
    `).join('');
    list.querySelectorAll('.msg-item').forEach(el => {
      el.addEventListener('click', () => openChat(el.dataset.id));
    });
  }

  function closeChat() {
    activeChatId = null;
    document.getElementById('chatPlaceholder').style.display = 'flex';
    document.getElementById('chatView').classList.remove('open');
    renderConversationList();
  }

  function openChat(id) {
    activeChatId = id;
    const conv = conversations.find(c => c.id === id);
    if (!conv) return;
    conv.unread = false;
    document.getElementById('chatPlaceholder').style.display = 'none';
    document.getElementById('chatView').classList.add('open');
    document.getElementById('chatHeader').innerHTML = `
      <button class="chat-back" onclick="closeChat()" aria-label="Back to dashboard" title="Back to dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <div class="msg-avatar">${conv.initial}</div>
      <div class="chat-header-info">
        <div class="chat-header-name">${conv.name}</div>
        <div class="chat-header-meta">${conv.property || 'Potential tenant'}</div>
      </div>
    `;
    if (!chatMessages[id]) chatMessages[id] = [];
    renderChatMessages();
    renderConversationList();
    saveChatData();
  }

  function renderChatMessages() {
    const el = document.getElementById('chatMessages');
    const msgs = chatMessages[activeChatId] || [];
    el.innerHTML = msgs.map(m => `
      <div class="chat-msg ${m.them ? 'them' : 'you'}">
        ${m.text.replace(/\n/g, '<br>')}
        <div class="time">${m.time || ''}</div>
      </div>
    `).join('');
    el.scrollTop = el.scrollHeight;
  }

  function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text || !activeChatId) return;
    const now = new Date();
    const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
    if (!chatMessages[activeChatId]) chatMessages[activeChatId] = [];
    chatMessages[activeChatId].push({ text, them: false, time });
    const conv = conversations.find(c => c.id === activeChatId);
    if (conv) {
      conv.preview = text.length > 50 ? text.slice(0,50) + '…' : text;
      conv.time = 'Just now';
    }
    input.value = '';
    input.style.height = 'auto';
    renderChatMessages();
    renderConversationList();
    saveChatData();
  }

  document.getElementById('btnSendMsg').addEventListener('click', sendMessage);
  document.getElementById('chatInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  document.getElementById('chatInput').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  renderConversationList();
</script>
</body>
</html>
