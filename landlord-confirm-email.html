<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifying… — Livvo</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #059669; --green-light: #10b981; --green-dark: #047857;
  --bg-dark: #f0f7f2; --text-dark: #1a2e24; --muted-dark: #4a7c5e;
}
body {
  background: var(--bg-dark);
  color: var(--text-dark);
  font-family: "DM Sans", sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.box {
  text-align: center;
  max-width: 360px;
}
.spinner {
  width: 48px;
  height: 48px;
  margin: 0 auto 20px;
  border: 3px solid rgba(5,150,105,0.2);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.box h1 { font-family: "Outfit", sans-serif; font-weight: 700; font-size: 1.25rem; margin-bottom: 8px; }
.box p { font-size: 0.9rem; color: var(--muted-dark); }
.box .error { color: #b91c1c; margin-top: 12px; }
.box a { color: var(--green); text-decoration: none; font-weight: 600; }
.box a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="box">
  <div class="spinner" id="spinner"></div>
  <h1 id="title">Verifying your email…</h1>
  <p id="msg">Taking you to list your property.</p>
  <p id="err" class="error" style="display:none;"></p>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
  (function() {
    const sb = getLivvoSupabase();
    if (!sb) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('title').textContent = 'Configuration needed';
      document.getElementById('msg').innerHTML = 'Supabase is not configured. <a href="landlord-login.html">Go to login</a>';
      return;
    }

    function finish(session) {
      if (session && session.user && session.user.email) {
        localStorage.setItem('livvo_landlord_email', session.user.email);
        localStorage.setItem('livvo_landlord_verified', '1');
        localStorage.setItem('livvo_landlord_logged_in', '1');
        window.location.replace('landlord-list-property.html');
        return true;
      }
      return false;
    }

    function showNoSession() {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('title').textContent = 'No verification detected';
      document.getElementById('msg').innerHTML = 'Click the link in your verification email, or <a href="landlord-login.html">log in</a> if you already verified.';
    }

    function showError(e) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('title').textContent = 'Something went wrong';
      document.getElementById('msg').style.display = 'none';
      const errEl = document.getElementById('err');
      errEl.style.display = 'block';
      errEl.innerHTML = (e && e.message ? e.message : 'Verification failed.') + ' <a href="landlord-login.html">Go to login</a>';
    }

    // Supabase puts tokens in URL hash on redirect; onAuthStateChange fires after client parses them
    const { data: { subscription } } = sb.auth.onAuthStateChange(function(event, session) {
      if (event === 'INITIAL_SESSION' || event === 'SIGNED_IN') {
        if (finish(session)) return;
        if (event === 'INITIAL_SESSION') {
          setTimeout(function() {
            sb.auth.getSession().then(function(_ref) {
              var s = _ref.data.session;
              if (finish(s)) return;
              subscription.unsubscribe();
              showNoSession();
            });
          }, 800);
        }
      }
    });

    // Fallback: after a short delay check session (hash may be parsed by then)
    setTimeout(function() {
      sb.auth.getSession().then(function(_ref) {
        var session = _ref.data.session;
        var err = _ref.error;
        if (err) { subscription.unsubscribe(); showError(err); return; }
        if (finish(session)) return;
        subscription.unsubscribe();
        showNoSession();
      });
    }, 1500);
  })();
</script>
</body>
</html>
