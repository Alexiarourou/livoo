<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landlord — Livvo</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #059669; --green-light: #10b981; --green-dark: #047857;
  --bg-dark: #f0f7f2; --surface-dark: #ffffff; --border-dark: #d4e5dc;
  --text-dark: #1a2e24; --muted-dark: #4a7c5e;
}
html { scroll-behavior: smooth; }
body { background: var(--bg-dark); color: var(--text-dark); font-family: "DM Sans", sans-serif; min-height: 100vh; }

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  height: 64px; padding: 0 48px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(255,255,255,0.95); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border-dark);
}
.logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
.logo-icon { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, var(--green), var(--green-light)); display: flex; align-items: center; justify-content: center; }
.logo-word { font-family: "Outfit", sans-serif; font-weight: 800; font-size: 1.2rem; letter-spacing: -0.04em; color: var(--text-dark); }
.logo-word span { color: var(--green); }
.nav-back { font-size: 0.83rem; color: var(--muted-dark); text-decoration: none; display: flex; align-items: center; gap: 6px; }
.nav-back:hover { color: var(--text-dark); }

.page { min-height: 100vh; padding: 100px 24px 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.welcome-card {
  width: 100%; max-width: 480px;
  background: var(--surface-dark);
  border: 1px solid var(--border-dark);
  border-radius: 20px;
  padding: 40px 36px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.06);
}
.welcome-card h1 { font-family: "Outfit", sans-serif; font-weight: 800; font-size: 1.5rem; letter-spacing: -0.03em; margin-bottom: 8px; text-align: center; }
.welcome-card .sub { font-size: 0.9rem; color: var(--muted-dark); margin-bottom: 32px; line-height: 1.5; text-align: center; }

.choice-btns { display: flex; flex-direction: column; gap: 14px; }
.choice-btn {
  display: block;
  width: 100%;
  padding: 18px 24px;
  background: var(--surface-dark);
  border: 2px solid var(--border-dark);
  border-radius: 14px;
  font-family: "DM Sans", sans-serif; font-size: 1rem; font-weight: 600;
  color: var(--text-dark);
  text-decoration: none;
  text-align: left;
  transition: all 0.2s;
  cursor: pointer;
}
.choice-btn:hover { border-color: var(--green); background: rgba(5,150,105,0.06); color: var(--green-dark); }
.choice-btn.primary { background: var(--green); border-color: var(--green); color: white; }
.choice-btn.primary:hover { background: var(--green-dark); border-color: var(--green-dark); color: white; transform: translateY(-1px); }
.choice-btn .label { display: block; font-weight: 700; margin-bottom: 4px; }
.choice-btn .hint { font-size: 0.85rem; font-weight: 400; opacity: 0.9; }
.choice-btn.primary .hint { opacity: 0.9; }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <div class="logo-icon"><svg viewBox="0 0 18 18" fill="none" width="16" height="16"><path d="M2 3L9 15L16 3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <span class="logo-word">li<span>vv</span>o</span>
  </a>
  <a href="index.html" class="nav-back">← Back to Livvo</a>
</nav>

<div class="page">
  <div class="welcome-card">
    <h1>Are you an existing or new landlord?</h1>
    <p class="sub">Choose how you'd like to continue</p>
    <div class="choice-btns">
      <a href="landlord-login.html" class="choice-btn">
        <span class="label">Existing landlord</span>
        <span class="hint">I already have an account — log in to manage my properties</span>
      </a>
      <a href="landlord-signup.html" class="choice-btn primary">
        <span class="label">New landlord</span>
        <span class="hint">I want to create an account and list my property</span>
      </a>
    </div>
  </div>
</div>
</body>
</html>
