<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set up your profile | Livvo</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23059669'/><path d='M8 12l8 12 8-12-4-6H12z' stroke='white' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #059669;
  --green-light: #10b981;
  --green-dark: #047857;
  --btn-green: #1a7a4a;
  --btn-green-hover: #156b42;
  --bg: #edf7f0;
  --surface: #ffffff;
  --border: #d4e5dc;
  --text: #1a2e24;
  --muted: #4a7c5e;
}
body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: "DM Sans", sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 20px 48px;
}
.setup-wrap { width: 100%; max-width: 440px; }
.setup-card {
  background: var(--surface);
  border: 1px solid #d4eadb;
  border-radius: 18px;
  padding: 36px 32px 40px;
  box-shadow: 0 12px 40px rgba(26, 46, 36, 0.08);
}
.setup-card h1 {
  font-family: "Sora", sans-serif;
  font-weight: 700;
  font-size: 1.5rem;
  letter-spacing: -0.03em;
  text-align: center;
  margin-bottom: 8px;
}
.setup-sub {
  font-size: 0.9rem;
  color: var(--muted);
  text-align: center;
  line-height: 1.55;
  margin-bottom: 28px;
}
.form-row { margin-bottom: 20px; }
.form-row label {
  display: block;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 8px;
}
.photo-block { display: flex; flex-direction: column; align-items: center; margin-bottom: 24px; }
.photo-upload-wrap {
  position: relative;
  display: block;
  width: 112px;
  height: 112px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px dashed var(--border);
  background: #f8fcfa;
  overflow: hidden;
  transition: border-color 0.2s, background 0.2s;
}
.photo-upload-wrap:hover {
  border-color: var(--btn-green);
  background: rgba(26, 122, 74, 0.06);
}
.photo-upload-wrap img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  z-index: 1;
}
.photo-upload-wrap .photo-placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 4px;
  font-size: 0.75rem;
  color: var(--muted);
  text-align: center;
  padding: 12px;
  pointer-events: none;
}
.photo-upload-wrap.has-image .photo-placeholder { display: none; }
.photo-hint {
  margin-top: 10px;
  font-size: 0.78rem;
  color: var(--muted);
}
#photo-input {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  cursor: pointer;
  font-size: 0;
  z-index: 2;
}

.city-pill-row { display: flex; justify-content: center; margin-bottom: 8px; }
.city-pill {
  display: inline-flex;
  align-items: center;
  font-family: "DM Sans", sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--btn-green);
  background: rgba(26, 122, 74, 0.12);
  border: 1px solid rgba(26, 122, 74, 0.35);
  padding: 8px 16px;
  border-radius: 999px;
}

input[type="text"],
select,
textarea {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-family: "DM Sans", sans-serif;
  font-size: 0.95rem;
  color: var(--text);
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--btn-green);
}
textarea { min-height: 88px; resize: vertical; }
.char-count {
  font-size: 0.75rem;
  color: var(--muted);
  text-align: right;
  margin-top: 6px;
}
.char-count.at-limit { color: var(--btn-green); font-weight: 600; }

.btn-complete {
  width: 100%;
  margin-top: 8px;
  padding: 15px;
  font-family: "DM Sans", sans-serif;
  font-size: 1rem;
  font-weight: 600;
  color: #fff;
  background: var(--btn-green);
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-complete:hover { background: var(--btn-green-hover); }
.btn-complete:disabled { opacity: 0.55; cursor: not-allowed; }

.field-error {
  display: block;
  font-size: 0.8rem;
  color: #b91c1c;
  margin-top: 8px;
  line-height: 1.4;
}
.field-error[hidden] { display: none !important; }

.req-star {
  color: #dc2626;
  font-weight: 700;
  font-size: 0.95em;
  margin-left: 2px;
}
.photo-field-label {
  display: block;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 8px;
  text-align: center;
}

.back-link {
  display: block;
  text-align: center;
  margin-top: 20px;
  font-size: 0.85rem;
  color: var(--muted);
}
.back-link a { color: var(--btn-green); font-weight: 600; text-decoration: none; }
.back-link a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="setup-wrap">
  <div class="setup-card">
    <h1>Complete your profile</h1>
    <p class="setup-sub">A quick intro so people in your city know who you are.</p>
    <form id="profile-form" novalidate action="#" onsubmit="return false;">
      <div class="photo-block">
        <label class="photo-field-label" for="photo-input">Profile photo<span class="req-star" aria-hidden="true">*</span></label>
        <label class="photo-upload-wrap" id="photo-label" for="photo-input">
          <input type="file" id="photo-input" accept="image/*" />
          <img id="photo-preview" alt="" hidden />
          <span class="photo-placeholder" id="photo-placeholder">
            <span style="font-size:1.5rem;line-height:1;">+</span>
            <span>Add photo</span>
          </span>
        </label>
        <p class="photo-hint">Click to upload your profile photo — required</p>
        <p id="photo-error" class="field-error" role="alert" hidden></p>
      </div>

      <div class="city-pill-row">
        <span class="city-pill" id="city-pill">My city</span>
      </div>

      <div class="form-row">
        <label for="username">Username <span style="color: red;">*</span></label>
        <input type="text" id="username" name="username" maxlength="40" autocomplete="username" placeholder="How you want to appear" />
        <p id="username-error" class="field-error" role="alert" hidden></p>
      </div>

      <div class="form-row">
        <label for="profession">I am... <span style="color: red;">*</span></label>
        <select id="profession" name="profession">
          <option value="" disabled selected>Select one</option>
          <option value="A student">A student</option>
          <option value="A young professional">A young professional</option>
          <option value="A remote worker">A remote worker</option>
          <option value="An expat">An expat</option>
          <option value="Just exploring">Just exploring</option>
          <option value="Other">Other</option>
        </select>
        <p id="role-error" class="field-error" role="alert" hidden></p>
      </div>

      <div class="form-row">
        <label for="bio">About me <span style="font-weight:400;color:var(--muted);">(optional)</span></label>
        <textarea id="bio" name="bio" maxlength="150" placeholder="Tell people a little about you…"></textarea>
        <div class="char-count" id="bio-count"><span id="bio-count-num">0</span> / 150</div>
      </div>

      <button type="button" class="btn-complete" id="complete-btn">Complete my profile</button>
    </form>
    <p class="back-link"><a href="community.html">← Back to cities</a></p>
  </div>
</div>

<script>
(function () {
  var cityNames = {
    paris: 'Paris', athens: 'Athens', london: 'London', madrid: 'Madrid', milan: 'Milan',
    barcelona: 'Barcelona', berlin: 'Berlin', amsterdam: 'Amsterdam', lisbon: 'Lisbon',
    prague: 'Prague', budapest: 'Budapest', vienna: 'Vienna', copenhagen: 'Copenhagen',
    stockholm: 'Stockholm', dublin: 'Dublin', brussels: 'Brussels', valencia: 'Valencia',
    seville: 'Seville', porto: 'Porto', rome: 'Rome', florence: 'Florence', bologna: 'Bologna',
    munich: 'Munich', hamburg: 'Hamburg', zurich: 'Zurich', geneva: 'Geneva', rotterdam: 'Rotterdam',
    ghent: 'Ghent', krakow: 'Krakow', warsaw: 'Warsaw', tallinn: 'Tallinn', riga: 'Riga', tbilisi: 'Tbilisi',
    bucharest: 'Bucharest', sofia: 'Sofia', zagreb: 'Zagreb'
  };
  function titleCaseFromRaw(str) {
    if (!str || !str.trim()) return '';
    return str.trim().replace(/\s+/g, ' ').replace(/\b\w/g, function (c) { return c.toUpperCase(); });
  }
  function displayNameFromParam(rawCity) {
    var slug = rawCity.toLowerCase().trim().replace(/[\s_-]+/g, '');
    return cityNames[slug] || titleCaseFromRaw(rawCity);
  }
  var params = new URLSearchParams(location.search);
  var rawCity = params.get('city');
  var hasUrlCity = rawCity && String(rawCity).trim();
  if (!hasUrlCity) {
    var stored = localStorage.getItem('livvo_city');
    if (stored && stored.trim()) {
      window.location.replace('profile-setup.html?city=' + encodeURIComponent(stored.trim()));
    } else {
      window.location.replace('signup.html');
    }
    return;
  }
  var cityDisplay = displayNameFromParam(rawCity);
  document.getElementById('city-pill').textContent = 'My city: ' + cityDisplay;
  localStorage.setItem('livvo_city', cityDisplay);
  window.__livvoCityDisplay = cityDisplay;
})();
</script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script>
(function () {
  if (!window.__livvoCityDisplay) return;
  var cityDisplay = window.__livvoCityDisplay;

  var firebaseConfig = {
    apiKey: "AIzaSyBfKo7gumTCJ1FtqnrV-uGAgoIvhZPowTI",
    authDomain: "livvo-573e1.firebaseapp.com",
    projectId: "livvo-573e1",
    storageBucket: "livvo-573e1.firebasestorage.app",
    messagingSenderId: "438563892670",
    appId: "1:438563892670:web:c038316d9d3fcbee065def"
  };
  firebase.initializeApp(firebaseConfig);

  firebase.auth().onAuthStateChanged(async function (user) {
    if (!user) {
      window.location.href = 'signup.html?city=' + encodeURIComponent(cityDisplay);
      return;
    }
    try {
      var snap = await firebase.firestore().collection('users').doc(user.uid).get();
      if (snap.exists) {
        var d = snap.data();
        var name = String(d.username || d.displayName || '').trim();
        var cityVal = String(d.city || '').trim();
        var prof = String(d.profession || d.role || '').trim();
        if (name && cityVal && prof) {
          localStorage.setItem('livvo_city', cityDisplay);
          window.location.replace('community-portal.html?city=' + encodeURIComponent(cityDisplay));
        }
      }
    } catch (e) {
      console.error(e);
    }
  });

  var photoInput = document.getElementById('photo-input');
  var photoPreview = document.getElementById('photo-preview');
  var photoLabel = document.getElementById('photo-label');
  var photoErrorEl = document.getElementById('photo-error');
  var bio = document.getElementById('bio');
  var bioCountNum = document.getElementById('bio-count-num');
  var bioCountRow = document.getElementById('bio-count');

  photoInput.addEventListener('change', function () {
    var f = photoInput.files && photoInput.files[0];
    if (!f || !f.type.startsWith('image/')) return;
    var url = URL.createObjectURL(f);
    photoPreview.src = url;
    photoPreview.hidden = false;
    photoLabel.classList.add('has-image');
    photoErrorEl.textContent = '';
    photoErrorEl.hidden = true;
  });

  function updateBioCount() {
    var n = (bio.value || '').length;
    bioCountNum.textContent = String(n);
    bioCountRow.classList.toggle('at-limit', n >= 150);
  }
  bio.addEventListener('input', updateBioCount);
  updateBioCount();

  document.getElementById('complete-btn').addEventListener('click', async function () {
    try {
      alert("Step 1: button clicked");

      var username = document.getElementById('username').value.trim();
      var profession = document.getElementById('profession').value;
      alert("Step 2: username = " + username);

      if (!username) { alert("Please enter a username"); return; }
      if (!profession) { alert("Please select what describes you"); return; }

      var user = firebase.auth().currentUser;
      if (!user) { alert("Not logged in"); return; }

      alert("Step 3: user logged in as " + user.uid);

      alert("Step 4: saving to Firestore...");
      await firebase.firestore().collection('users').doc(user.uid).set({
        username: username,
        profession: profession,
        city: localStorage.getItem('livvo_city') || 'Athens',
        email: user.email,
        createdAt: new Date()
      });

      alert("Step 5: saved! redirecting...");
      window.location.href = 'community-portal.html';
    } catch (err) {
      console.error(err);
      alert("ERROR: " + err.message);
    }
  });
})();
</script>
</body>
</html>
