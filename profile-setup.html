<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set up your profile | Livvo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="livvo-base.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23059669'/><path d='M8 12l8 12 8-12-4-6H12z' stroke='white' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #059669;
  --green-light: #10b981;
  --green-dark: #047857;
  --btn-green: #1a7a4a;
  --btn-green-hover: #156b42;
  --bg: #edf7f0;
  --surface: #ffffff;
  --border: #d4e5dc;
  --text: #1a2e24;
  --muted: #4a7c5e;
}
body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: "DM Sans", sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 20px 48px;
}
.setup-wrap { width: 100%; max-width: 440px; }
.setup-card {
  background: var(--surface);
  border: 1px solid #d4eadb;
  border-radius: 18px;
  padding: 36px 32px 40px;
  box-shadow: 0 12px 40px rgba(26, 46, 36, 0.08);
}
.setup-card h1 {
  font-family: "Sora", sans-serif;
  font-weight: 700;
  font-size: 1.5rem;
  letter-spacing: -0.03em;
  text-align: center;
  margin-bottom: 8px;
}
.setup-sub {
  font-size: 0.9rem;
  color: var(--muted);
  text-align: center;
  line-height: 1.55;
  margin-bottom: 28px;
}
.form-row { margin-bottom: 20px; }
.form-row label {
  display: block;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 8px;
}
.photo-block { display: flex; flex-direction: column; align-items: center; margin-bottom: 24px; }
.photo-upload-wrap {
  position: relative;
  display: block;
  width: 112px;
  height: 112px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px dashed var(--border);
  background: #f8fcfa;
  overflow: hidden;
  transition: border-color 0.2s, background 0.2s;
}
.photo-upload-wrap:hover {
  border-color: var(--btn-green);
  background: rgba(26, 122, 74, 0.06);
}
.photo-upload-wrap img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  z-index: 1;
}
.photo-upload-wrap .photo-placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 4px;
  font-size: 0.75rem;
  color: var(--muted);
  text-align: center;
  padding: 12px;
  pointer-events: none;
}
.photo-upload-wrap.has-image .photo-placeholder { display: none; }
.photo-hint {
  margin-top: 10px;
  font-size: 0.78rem;
  color: var(--muted);
}
#photo-input {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  cursor: pointer;
  font-size: 0;
  z-index: 2;
}

.city-pill-row { display: flex; justify-content: center; margin-bottom: 8px; }
.city-pill {
  display: inline-flex;
  align-items: center;
  font-family: "DM Sans", sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--btn-green);
  background: rgba(26, 122, 74, 0.12);
  border: 1px solid rgba(26, 122, 74, 0.35);
  padding: 8px 16px;
  border-radius: 999px;
}

input[type="text"],
select,
textarea {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-family: "DM Sans", sans-serif;
  font-size: 0.95rem;
  color: var(--text);
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--btn-green);
}
textarea { min-height: 88px; resize: vertical; }
.char-count {
  font-size: 0.75rem;
  color: var(--muted);
  text-align: right;
  margin-top: 6px;
}
.char-count.at-limit { color: var(--btn-green); font-weight: 600; }

.topic-pick-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.topic-pick-item { position: relative; }
.topic-pick-item input {
  position: absolute;
  opacity: 0;
  width: 0;
  height: 0;
}
.topic-pick-item label {
  display: inline-block;
  padding: 8px 12px;
  border-radius: 999px;
  border: 1.5px solid var(--border);
  background: #fff;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s, color 0.15s;
}
.topic-pick-item input:focus-visible + label {
  outline: 2px solid var(--btn-green);
  outline-offset: 2px;
}
.topic-pick-item input:checked + label {
  border-color: var(--green);
  background: #ecfdf5;
  color: #064e3b;
}

.btn-complete {
  width: 100%;
  margin-top: 8px;
  padding: 15px;
  font-family: "DM Sans", sans-serif;
  font-size: 1rem;
  font-weight: 600;
  color: #fff;
  background: var(--btn-green);
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: background 0.2s;
  text-align: center;
  box-sizing: border-box;
  -webkit-user-select: none;
  user-select: none;
}
.btn-complete:hover { background: var(--btn-green-hover); }
.btn-complete:disabled,
.btn-complete[aria-busy="true"] { opacity: 0.65; cursor: not-allowed; }

.field-error {
  display: block;
  font-size: 0.8rem;
  color: #b91c1c;
  margin-top: 8px;
  line-height: 1.4;
}
.field-error[hidden] { display: none !important; }

.req-star {
  color: #dc2626;
  font-weight: 700;
  font-size: 0.95em;
  margin-left: 2px;
}
.photo-field-label {
  display: block;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 8px;
  text-align: center;
}

.back-link {
  display: block;
  text-align: center;
  margin-top: 20px;
  font-size: 0.85rem;
  color: var(--muted);
}
.back-link a { color: var(--btn-green); font-weight: 600; text-decoration: none; }
.back-link a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="setup-wrap">
  <div class="setup-card">
    <h1 id="profile-setup-heading">Complete your profile</h1>
    <p class="setup-sub">A quick intro so people in your city know who you are.</p>
    <form id="profile-form" novalidate action="#" onsubmit="return false;">
      <div class="photo-block">
        <label class="photo-field-label" for="photo-input">Profile photo<span class="req-star" aria-hidden="true">*</span></label>
        <label class="photo-upload-wrap" id="photo-label" for="photo-input">
          <input type="file" id="photo-input" accept="image/*" />
          <img id="photo-preview" alt="" hidden />
          <span class="photo-placeholder" id="photo-placeholder">
            <span style="font-size:1.5rem;line-height:1;">+</span>
            <span>Add photo</span>
          </span>
        </label>
        <p class="photo-hint">Click to upload your profile photo — required</p>
        <p id="photo-error" class="field-error" role="alert" hidden></p>
      </div>

      <div class="city-pill-row">
        <span class="city-pill" id="city-pill">My city</span>
      </div>

      <div class="form-row">
        <label for="profile-name">Display name <span style="color: red;">*</span></label>
        <input type="text" id="profile-name" name="username" maxlength="40" autocomplete="username" placeholder="How you want to appear" />
        <p id="username-error" class="field-error" role="alert" hidden></p>
      </div>

      <div class="form-row">
        <label for="profession">I am... <span style="color: red;">*</span></label>
        <select id="profession" name="profession">
          <option value="" disabled selected>Select one</option>
          <option value="A student">A student</option>
          <option value="A young professional">A young professional</option>
          <option value="A remote worker">A remote worker</option>
          <option value="An expat">An expat</option>
          <option value="Just exploring">Just exploring</option>
          <option value="Other">Other</option>
        </select>
        <p id="role-error" class="field-error" role="alert" hidden></p>
      </div>

      <div class="form-row">
        <label for="profile-bio">About me <span style="font-weight:400;color:var(--muted);">(optional)</span></label>
        <textarea id="profile-bio" name="bio" maxlength="150" placeholder="Tell people a little about you…"></textarea>
        <div class="char-count" id="bio-count"><span id="bio-count-num">0</span> / 150</div>
      </div>

      <div class="form-row">
        <label>What topics interest you? <span style="font-weight:400;color:var(--muted);">(optional)</span></label>
        <div class="topic-pick-grid" id="topic-pick-grid" aria-label="Topics you follow">
          <div class="topic-pick-item"><input type="checkbox" id="topic-housing" value="housing" /><label for="topic-housing">Housing</label></div>
          <div class="topic-pick-item"><input type="checkbox" id="topic-events" value="events" /><label for="topic-events">Events</label></div>
          <div class="topic-pick-item"><input type="checkbox" id="topic-visa_admin" value="visa_admin" /><label for="topic-visa_admin">Visa &amp; Admin</label></div>
          <div class="topic-pick-item"><input type="checkbox" id="topic-jobs_remote" value="jobs_remote" /><label for="topic-jobs_remote">Jobs &amp; Remote Work</label></div>
          <div class="topic-pick-item"><input type="checkbox" id="topic-things_to_do" value="things_to_do" /><label for="topic-things_to_do">Things to Do</label></div>
          <div class="topic-pick-item"><input type="checkbox" id="topic-recommendations" value="recommendations" /><label for="topic-recommendations">Recommendations</label></div>
        </div>
      </div>

      <div class="form-row">
        <label for="profile-credential">Your one-liner <span style="font-weight:400;color:var(--muted);">(optional, max 60)</span></label>
        <input type="text" id="profile-credential" name="credential" maxlength="60" autocomplete="off" placeholder="e.g. Moved to Athens 2 years ago" />
        <div class="char-count" id="cred-count"><span id="cred-count-num">0</span> / 60</div>
      </div>

      <button type="button" class="btn-complete" id="save-profile-btn">Complete my profile</button>
      <p id="complete-error" class="field-error" role="alert" style="text-align:center;margin-top:10px;" hidden></p>
    </form>
    <div id="delete-account-wrap" style="text-align:center;margin-top:24px;padding-top:24px;border-top:1px solid #f0f5f0;" hidden>
      <button type="button" onclick="confirmDeleteAccount()"
        style="border:none;background:none;font-size:13px;color:#c0c0c0;cursor:pointer;text-decoration:underline;">
        Delete my account
      </button>
    </div>
    <p class="back-link"><a href="community.html">← Back to cities</a></p>
  </div>
</div>

<script>
(function () {
  function whenReady(fn) {
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', fn);
    } else {
      fn();
    }
  }
  whenReady(function () {
  var cityNames = {
    paris: 'Paris', athens: 'Athens', london: 'London', madrid: 'Madrid', milan: 'Milan',
    barcelona: 'Barcelona', berlin: 'Berlin', amsterdam: 'Amsterdam', lisbon: 'Lisbon',
    prague: 'Prague', budapest: 'Budapest', vienna: 'Vienna', copenhagen: 'Copenhagen',
    stockholm: 'Stockholm', dublin: 'Dublin', brussels: 'Brussels', valencia: 'Valencia',
    seville: 'Seville', porto: 'Porto', rome: 'Rome', florence: 'Florence', bologna: 'Bologna',
    munich: 'Munich', hamburg: 'Hamburg', zurich: 'Zurich', geneva: 'Geneva', rotterdam: 'Rotterdam',
    ghent: 'Ghent', krakow: 'Krakow', warsaw: 'Warsaw', tallinn: 'Tallinn', riga: 'Riga', tbilisi: 'Tbilisi',
    bucharest: 'Bucharest', sofia: 'Sofia', zagreb: 'Zagreb'
  };
  function titleCaseFromRaw(str) {
    if (!str || !str.trim()) return '';
    return str.trim().replace(/\s+/g, ' ').replace(/\b\w/g, function (c) { return c.toUpperCase(); });
  }
  function displayNameFromParam(rawCity) {
    var slug = rawCity.toLowerCase().trim().replace(/[\s_-]+/g, '');
    return cityNames[slug] || titleCaseFromRaw(rawCity);
  }
  var params = new URLSearchParams(location.search);
  var rawCity = params.get('city');
  var hasUrlCity = rawCity && String(rawCity).trim();
  if (!hasUrlCity) {
    var stored = localStorage.getItem('livvo_city');
    if (stored && stored.trim()) {
      window.location.replace('profile-setup.html?city=' + encodeURIComponent(stored.trim()));
    } else {
      window.location.replace('signup.html');
    }
    return;
  }
  var cityDisplay = displayNameFromParam(rawCity);
  document.getElementById('city-pill').textContent = 'My city: ' + cityDisplay;
  localStorage.setItem('livvo_city', cityDisplay);
  window.__livvoCityDisplay = cityDisplay;
  });
})();
</script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
<script>
(function () {
  function whenReady(fn) {
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', fn);
    } else {
      fn();
    }
  }
  whenReady(function () {
  if (!window.__livvoCityDisplay) {
    return;
  }
  var cityDisplay = window.__livvoCityDisplay;
  var isEditMode = new URLSearchParams(location.search).get('edit') === '1';
  var loadedProfession = '';

  function updateBioCountFromDom() {
    var b = document.getElementById('profile-bio');
    var bioCountNum = document.getElementById('bio-count-num');
    var bioCountRow = document.getElementById('bio-count');
    if (!b || !bioCountNum || !bioCountRow) return;
    var n = (b.value || '').length;
    bioCountNum.textContent = String(n);
    bioCountRow.classList.toggle('at-limit', n >= 150);
  }

  function updateCredCountFromDom() {
    var c = document.getElementById('profile-credential');
    var num = document.getElementById('cred-count-num');
    var row = document.getElementById('cred-count');
    if (!c || !num || !row) return;
    var n = (c.value || '').length;
    num.textContent = String(n);
    row.classList.toggle('at-limit', n >= 60);
  }

  function normalizeCityForSave(city) {
    var s = String(city || '').trim();
    if (!s) return '';
    return s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
  }

  var firebaseConfig = {
    apiKey: "AIzaSyBfKo7gumTCJ1FtqnrV-uGAgoIvhZPowTI",
    authDomain: "livvo-573e1.firebaseapp.com",
    projectId: "livvo-573e1",
    storageBucket: "livvo-573e1.firebasestorage.app",
    messagingSenderId: "438563892670",
    appId: "1:438563892670:web:c038316d9d3fcbee065def"
  };
  firebase.initializeApp(firebaseConfig);

  firebase.auth().onAuthStateChanged(async function (user) {
    if (!user) {
      window.location.href = 'signup.html?redirect=community&city=' + encodeURIComponent(cityDisplay);
      return;
    }
    if (document.getElementById('profile-name')) {
      document.getElementById('profile-name').value = String(user.displayName || '').trim();
    }
    try {
      var snap = await firebase.firestore().collection('users').doc(user.uid).get();
      if (snap.exists) {
        var d = snap.data();
        var uname = String(d.username || d.displayName || '').trim();
        if (!uname && user.displayName) {
          uname = String(user.displayName || '').trim();
        }
        document.getElementById('profile-name').value = uname;
        loadedProfession = String(d.profession || d.role || '').trim();
        var profEl = document.getElementById('profession');
        profEl.value = loadedProfession;
        if (loadedProfession && profEl.value !== loadedProfession) {
          for (var oi = 0; oi < profEl.options.length; oi++) {
            var opt = profEl.options[oi];
            if (opt.value === loadedProfession || opt.textContent.trim() === loadedProfession) {
              profEl.value = opt.value;
              break;
            }
          }
        }
        document.getElementById('profile-bio').value = String(d.aboutMe || d.bio || '').trim();
        var credEl = document.getElementById('profile-credential');
        if (credEl) credEl.value = String(d.credential || '').trim();
        var ft = d.followedTopics;
        if (Array.isArray(ft)) {
          ft.forEach(function (slug) {
            var cb = document.querySelector('#topic-pick-grid input[value="' + String(slug).replace(/"/g, '') + '"]');
            if (cb) cb.checked = true;
          });
        }
        if (d.photoURL) {
          var prevEl = document.getElementById('photo-preview');
          var lblEl = document.getElementById('photo-label');
          if (prevEl && lblEl) {
            prevEl.src = d.photoURL;
            prevEl.hidden = false;
            lblEl.classList.add('has-image');
          }
        }
        updateBioCountFromDom();
        updateCredCountFromDom();
        var name = String(d.username || d.displayName || '').trim();
        var cityVal = String(d.city || '').trim();
        var prof = String(d.profession || d.role || '').trim();
        if (!isEditMode && name && cityVal && prof) {
          localStorage.setItem('livvo_city', cityDisplay);
          window.location.replace('community-portal.html?city=' + encodeURIComponent(cityDisplay));
        }
      }
    } catch (e) {
      console.error(e);
    }
  });

  if (isEditMode) {
    var ph = document.getElementById('profile-setup-heading');
    if (ph) ph.textContent = 'Edit your profile';
    var sv = document.getElementById('save-profile-btn');
    if (sv) sv.textContent = 'Save changes';
    var hint = document.querySelector('.photo-hint');
    if (hint) hint.textContent = 'Click to change your photo (optional)';
    var star = document.querySelector('.photo-field-label .req-star');
    if (star) star.style.display = 'none';
    var delWrap = document.getElementById('delete-account-wrap');
    if (delWrap) delWrap.hidden = false;
  }

  var photoInput = document.getElementById('photo-input');
  var photoPreview = document.getElementById('photo-preview');
  var photoLabel = document.getElementById('photo-label');
  var photoErrorEl = document.getElementById('photo-error');
  var bio = document.getElementById('profile-bio');

  photoInput.addEventListener('change', function () {
    var f = photoInput.files && photoInput.files[0];
    if (!f || !f.type.startsWith('image/')) return;
    var url = URL.createObjectURL(f);
    photoPreview.src = url;
    photoPreview.hidden = false;
    photoLabel.classList.add('has-image');
    photoErrorEl.textContent = '';
    photoErrorEl.hidden = true;
  });

  bio.addEventListener('input', function () {
    updateBioCountFromDom();
  });
  updateBioCountFromDom();
  var credIn = document.getElementById('profile-credential');
  if (credIn) {
    credIn.addEventListener('input', updateCredCountFromDom);
    updateCredCountFromDom();
  }

  var completeBtn = document.getElementById('save-profile-btn');
  var completeErrorEl = document.getElementById('complete-error');
  var usernameErrorEl = document.getElementById('username-error');
  var roleErrorEl = document.getElementById('role-error');
  var usernameInputEl = document.getElementById('profile-name');
  var professionSelectEl = document.getElementById('profession');

  function hideCompleteError() {
    completeErrorEl.textContent = '';
    completeErrorEl.hidden = true;
  }
  function showFieldErr(el, msg) {
    el.textContent = msg;
    el.hidden = false;
  }
  function clearProfileFieldErrors() {
    usernameErrorEl.textContent = '';
    usernameErrorEl.hidden = true;
    roleErrorEl.textContent = '';
    roleErrorEl.hidden = true;
    photoErrorEl.textContent = '';
    photoErrorEl.hidden = true;
  }

  if (!completeBtn) {
    console.error('save-profile-btn element not found');
    return;
  }

  usernameInputEl.addEventListener('input', function () {
    usernameErrorEl.textContent = '';
    usernameErrorEl.hidden = true;
  });
  professionSelectEl.addEventListener('change', function () {
    roleErrorEl.textContent = '';
    roleErrorEl.hidden = true;
  });

  async function saveProfile() {
    hideCompleteError();
    clearProfileFieldErrors();

    var displayName = usernameInputEl.value.trim();
    var profession = professionSelectEl.value;
    if (isEditMode && !profession && loadedProfession) {
      profession = loadedProfession;
    }
    var bioVal = (bio.value || '').trim();
    var credentialVal = credIn ? (credIn.value || '').trim().slice(0, 60) : '';
    var followedTopics = [];
    document.querySelectorAll('#topic-pick-grid input[type="checkbox"]:checked').forEach(function (cb) {
      followedTopics.push(cb.value);
    });

    if (!displayName) {
      usernameInputEl.style.borderColor = '#e53e3e';
      showFieldErr(usernameErrorEl, 'Please enter a display name');
      return;
    }
    usernameInputEl.style.borderColor = '';
    if (!isEditMode && !profession) {
      showFieldErr(roleErrorEl, 'Please select what describes you');
      return;
    }
    var hasPhotoFile = !!(photoInput.files && photoInput.files[0]);
    var hasExistingPhoto = photoPreview && !photoPreview.hidden && photoPreview.src && !String(photoPreview.src).startsWith('blob:');
    if (!isEditMode && !hasPhotoFile && !hasExistingPhoto) {
      showFieldErr(photoErrorEl, 'Please add a profile photo');
      return;
    }
    photoErrorEl.hidden = true;

    var user = firebase.auth().currentUser;
    if (!user) {
      completeErrorEl.textContent = 'Session expired. Please sign in again.';
      completeErrorEl.hidden = false;
      return;
    }

    completeBtn.disabled = true;
    completeBtn.setAttribute('aria-busy', 'true');
    completeBtn.textContent = 'Saving...';

    try {
      var photoURL = '';
      if (photoInput.files && photoInput.files[0]) {
        var file = photoInput.files[0];
        // Must match storage.rules path: profile-photos/{userId}/...
        var path = 'profile-photos/' + user.uid + '/' + Date.now() + '_' + file.name.replace(/\s+/g, '_');
        var snapUpload = await firebase.storage().ref(path).put(file);
        photoURL = await snapUpload.ref.getDownloadURL();
      } else if (photoPreview && !photoPreview.hidden && photoPreview.src && !String(photoPreview.src).startsWith('blob:')) {
        photoURL = photoPreview.src;
      }
      var finalPhotoURL = photoURL;
      var authUpdate = { displayName: displayName };
      if (finalPhotoURL) authUpdate.photoURL = finalPhotoURL;
      await user.updateProfile(authUpdate);
      var payload = {
        username: displayName,
        profession: profession || '',
        displayName: displayName,
        aboutMe: bioVal,
        bio: bioVal,
        credential: credentialVal,
        followedTopics: followedTopics,
        city: normalizeCityForSave(localStorage.getItem('livvo_city') || 'Athens'),
        email: user.email,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      };
      if (finalPhotoURL) payload.photoURL = finalPhotoURL;
      localStorage.setItem('livvo_city', payload.city);
      await firebase.firestore().collection('users').doc(user.uid).set(payload, { merge: true });

      var userCity = normalizeCityForSave(cityDisplay || localStorage.getItem('livvo_city') || '');
      if (userCity) {
        window.location.href = 'community-portal.html?city=' + encodeURIComponent(userCity);
      } else {
        window.location.href = 'community-portal.html';
      }
    } catch (err) {
      console.error('Profile save error:', err);
      var msg = 'Something went wrong. Please try again.';
      if (err && err.code === 'storage/unauthorized') {
        msg = 'Photo upload was blocked. Please try a smaller image or sign in again.';
      } else if (err && err.code === 'storage/quota-exceeded') {
        msg = 'Storage limit reached. Try a smaller photo.';
      }
      completeErrorEl.textContent = msg;
      completeErrorEl.hidden = false;
      completeBtn.textContent = 'Error — try again';
      completeBtn.disabled = false;
      completeBtn.removeAttribute('aria-busy');
    }
  }

  window.saveProfile = saveProfile;

  window.confirmDeleteAccount = async function confirmDeleteAccount() {
    if (!confirm('Are you sure you want to delete your account? This cannot be undone.')) return;
    try {
      var user = firebase.auth().currentUser;
      if (!user) return;
      await firebase.firestore().collection('users').doc(user.uid).delete();
      await user.delete();
      window.location.href = 'index.html';
    } catch (err) {
      if (err && err.code === 'auth/requires-recent-login') {
        alert('For security, please sign out and sign back in before deleting your account.');
      } else {
        console.error('Delete error:', err);
      }
    }
  };

  completeBtn.addEventListener('click', function () {
    saveProfile();
  });
  });
})();
</script>
</body>
</html>
