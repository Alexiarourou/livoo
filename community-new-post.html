<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Post — Livvo Community</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --green: #059669; --green-light: #10b981; --green-dark: #047857; --bg: #f0f7f2; --surface: #ffffff; --border: #d4e5dc; --text: #1a2e24; --muted: #4a7c5e; }
body { background: var(--bg); color: var(--text); font-family: "DM Sans", sans-serif; }
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; height: 56px; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.98); border-bottom: 1px solid var(--border); }
.logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
.logo-icon { width: 28px; height: 28px; border-radius: 6px; background: linear-gradient(135deg, var(--green), var(--green-light)); }
.logo-word { font-family: "Outfit", sans-serif; font-weight: 800; font-size: 1.1rem; }
.logo-word span { color: var(--green); }
.nav-back { font-size: 0.85rem; color: var(--muted); text-decoration: none; }
.nav-back:hover { color: var(--green); }
.page { max-width: 640px; margin: 0 auto; padding: 80px 24px 60px; }
.form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; }
.form-card h1 { font-family: "Outfit", sans-serif; font-weight: 800; font-size: 1.4rem; margin-bottom: 6px; }
.form-card .sub { font-size: 0.9rem; color: var(--muted); margin-bottom: 24px; }
.form-card label { display: block; font-size: 0.82rem; font-weight: 600; margin-bottom: 6px; }
.form-card input, .form-card textarea, .form-card select { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 10px; font-family: inherit; font-size: 0.95rem; margin-bottom: 16px; }
.form-card input:focus, .form-card textarea:focus, .form-card select:focus { outline: none; border-color: var(--green); }
.form-card textarea { min-height: 140px; resize: vertical; }
.btn-submit { background: var(--green); color: white; border: none; padding: 14px 28px; border-radius: 10px; font-family: inherit; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
.btn-submit:hover { background: var(--green-dark); }
.btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
.msg-success { display: none; background: rgba(5,150,105,0.1); border: 1px solid rgba(5,150,105,0.3); border-radius: 10px; padding: 14px; color: var(--green); font-size: 0.9rem; margin-bottom: 16px; }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo"><div class="logo-icon"></div><span class="logo-word">li<span>vv</span>o</span></a>
  <a href="#" class="nav-back" id="backLink">← Back to feed</a>
</nav>
<div class="page">
  <div class="form-card">
    <h1>Create a new post</h1>
    <p class="sub" id="subText">Share with the Athens community</p>
    <div class="msg-success" id="successMsg">Your post has been published! <a href="#" id="viewLink">View in feed</a> or <a href="#" id="postLink">View post</a></div>
    <form id="postForm" action="https://formspree.io/f/mbdzykvg" method="POST">
      <input type="hidden" name="source" value="community new post" />
      <input type="hidden" name="city" id="cityField" value="athens" />
      <label for="postTitle">Title</label>
      <input type="text" name="title" id="postTitle" placeholder="Summarise your post in a few words" required maxlength="120" />
      <label for="postTopic">Topic</label>
      <select name="topic" id="postTopic">
        <option value="Housing & flatshares">Housing & flatshares</option>
        <option value="Flatmate search">Flatmate search</option>
        <option value="Local tips">Local tips</option>
        <option value="Events & meetups">Events & meetups</option>
        <option value="Questions & advice">Questions & advice</option>
      </select>
      <label for="postBody">What's on your mind?</label>
      <textarea name="message" id="postBody" placeholder="Write your post..." required></textarea>
      <label for="postName">Your name</label>
      <input type="text" name="name" id="postName" placeholder="e.g. Alexia R." required />
      <label for="postEmail">Your email</label>
      <input type="email" name="email" id="postEmail" placeholder="your@email.com" required />
      <button type="submit" class="btn-submit" id="btnSubmit">Publish post</button>
    </form>
  </div>
</div>
<script>
  const params = new URLSearchParams(location.search);
  const city = (params.get('city') || 'athens').toLowerCase();
  const cityNames = { paris: 'Paris', athens: 'Athens', london: 'London' };
  const cityName = cityNames[city] || city;

  document.getElementById('backLink').href = 'community-feed.html?city=' + city;
  document.getElementById('subText').textContent = 'Share with the ' + cityName + ' community';
  document.getElementById('cityField').value = cityName;

  document.getElementById('postForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('btnSubmit');
    btn.disabled = true;
    btn.textContent = 'Publishing…';
    const formData = new FormData(this);
    const title = formData.get('title');
    const body = formData.get('message');
    const topic = formData.get('topic');
    const author = formData.get('name');
    const email = formData.get('email');
    const postId = 'user-' + Date.now();

    try {
      await fetch('https://formspree.io/f/mbdzykvg', { method: 'POST', body: formData, headers: { 'Accept': 'application/json' } });
    } catch(err) {}
    const post = { id: postId, city, title, body, topic, author: author + ' (' + email + ')', time: 'Just now', votes: 0, comments: [] };
    const stored = localStorage.getItem('livvo_posts') || '[]';
    const arr = JSON.parse(stored);
    arr.unshift(post);
    localStorage.setItem('livvo_posts', JSON.stringify(arr));

    document.getElementById('successMsg').style.display = 'block';
    document.getElementById('viewLink').href = 'community-feed.html?city=' + city;
    document.getElementById('postLink').href = 'community-post.html?id=' + postId + '&city=' + city;
    this.reset();
    btn.disabled = false;
    btn.textContent = 'Publish post';
  });
</script>
</body>
</html>
